components:
  schemas:
    UserCredentials:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "alice@gym.com"
        password:
          type: string
          example: "member123"
    User:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: "Alice Smith"
        email:
          type: string
          example: "alice@gym.com"
        phone:
          type: string
          example: "0400000000"
        address:
          type: string
          example: "123 Gym St"
        role:
          type: string
          enum: [member, trainer, admin]
          example: "member"
        authenticationKey:
          type: string
          format: uuid
    Session:
      type: object
      properties:
        id:
          type: number
          example: 1
        name:
          type: string
          example: "Morning Yoga"
        activityName:
          type: string
          example: "Yoga"
        trainerName:
          type: string
          example: "Sarah Johnson"
        locationName:
          type: string
          example: "Studio A"
        date:
          type: string
          format: date
          example: "2026-06-15"
        time:
          type: string
          example: "09:00:00"
        durationMinutes:
          type: number
          example: 60
        maxParticipants:
          type: number
          example: 20
        bookedCount:
          type: number
          example: 5
        description:
          type: string
          example: "A relaxing yoga session"
    Booking:
      type: object
      required:
        - sessionId
      properties:
        id:
          type: number
          example: 1
        sessionId:
          type: number
          example: 1
        status:
          type: string
          enum: [confirmed, cancelled, completed]
          example: "confirmed"
        sessionName:
          type: string
          example: "Morning Yoga"
        activityName:
          type: string
          example: "Yoga"
        sessionDate:
          type: string
          format: date
          example: "2026-06-15"
        sessionTime:
          type: string
          example: "09:00:00"
        trainerName:
          type: string
          example: "Sarah Johnson"
    Blog:
      type: object
      required:
        - title
        - content
      properties:
        id:
          type: number
          example: 1
        title:
          type: string
          example: "My Fitness Journey"
        content:
          type: string
          example: "Today I ran 5km for the first time..."
        category:
          type: string
          example: "Fitness Tips"
        authorName:
          type: string
          example: "Alice Smith"
        createdAt:
          type: string
          format: date-time
  responses:
    LoginSuccessful:
      description: "Login successful"
      content:
        application/json:
          schema:
            type: object
            properties:
              authenticationKey:
                type: string
                format: uuid
              id:
                type: number
                example: 1
              name:
                type: string
                example: "Alice Smith"
              role:
                type: string
                example: "member"
    Updated:
      description: "Item was updated"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Updated successfully"
    Created:
      description: "A new item was created"
      content:
        application/json:
          schema:
            type: object
            required:
              - id
              - message
            properties:
              id:
                type: number
                example: 1
              message:
                type: string
                example: "Item created"
    NotFound:
      description: "Item not found"
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                example: "Item not found"
    Error:
      description: "An error has occurred"
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                example: "Something went wrong"
              errors:
                type: array
                items:
                  type: string
