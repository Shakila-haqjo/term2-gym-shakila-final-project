<!-- html-version/pages/trainer/profile.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <span class="text-lg font-bold text-blue-600">High Street Gym</span>
                </div>
            </div>

            <nav class="flex-1 px-3 py-4">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Dashboard</span>
                </a>
                <a href="sessions.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>My Sessions</span>
                </a>
                <a href="blog.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>My Blog</span>
                </a>
                <a href="profile.html" class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 bg-blue-600 text-white">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="p-3">
                <button onclick="logout()"
                    class="w-full text-red-600 hover:bg-red-50 px-4 py-3 rounded-lg transition-colors border border-red-200">
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-white">

            <!-- Content -->
            <div class="p-12">
                <div class="max-w-2xl">

                    <h1 class="text-4xl font-bold text-gray-900 mb-12">My Profile</h1>

                    <!-- Profile Picture -->
                    <div class="flex flex-col items-center mb-8">
                        <div class="w-32 h-32 rounded-full overflow-hidden bg-gray-200 mb-4">
                            <img src="https://via.placeholder.com/128" alt="Profile" class="w-full h-full object-cover">
                        </div>
                        <button class="text-blue-600 hover:text-blue-700 font-semibold">
                            Change Photo
                        </button>
                    </div>

                    <form id="profileForm" onsubmit="handleProfileUpdate(event)" class="space-y-6">

                        <!-- Full Name -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Full Name</label>
                            <input type="text" id="fullName" value="John Smith" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>

                        <!-- Email -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Email</label>
                            <input type="email" id="email" value="john.smith@example.com" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>

                        <!-- Phone -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Phone</label>
                            <input type="tel" id="phone" value="+1234567890" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>

                        <!-- Specialization -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Specialization</label>
                            <input type="text" id="specialization" value="Personal Training, CrossFit" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>

                        <!-- Bio -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Bio</label>
                            <textarea id="bio" rows="4"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none">Certified personal trainer with 10 years of experience.</textarea>
                        </div>

                        <!-- Save Button -->
                        <button type="submit"
                            class="w-full py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                            Save Changes
                        </button>

                    </form>

                </div>
            </div>

        </main>

    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();
        protectPage('trainer');

        function handleProfileUpdate(event) {
            event.preventDefault();
            showToast('Profile updated successfully!', 'success');
        }
    </script>
</body>

</html>
