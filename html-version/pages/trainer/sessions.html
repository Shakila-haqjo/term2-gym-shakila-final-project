<!-- html-version/pages/trainer/sessions.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Training Sessions - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <span class="text-lg font-bold text-blue-600">High Street Gym</span>
                </div>
            </div>

            <nav class="flex-1 px-3 py-4">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Dashboard</span>
                </a>
                <a href="sessions.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 bg-blue-600 text-white">
                    <span>My Sessions</span>
                </a>
                <a href="blog.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>My Blog</span>
                </a>
                <a href="profile.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="p-3">
                <button onclick="logout()"
                    class="w-full text-red-600 hover:bg-red-50 px-4 py-3 rounded-lg transition-colors">
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-white">

            <!-- Header -->
            <header class="bg-white border-b border-gray-200 px-8 py-6 flex items-center justify-between">
                <h1 class="text-2xl font-bold text-gray-900">My Training Sessions</h1>
                <button onclick="navigateTo('create-session.html')"
                    class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">
                    + Create New Session
                </button>
            </header>

            <!-- Sessions Table -->
            <div class="p-8">
                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Session Name
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Activity
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date/Time
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Location
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Bookings
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="sessionsTable" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>

        </main>

    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();
        protectPage('trainer');

        const sessions = [
            { id: 1, name: 'Morning Training', activity: 'Personal Training', datetime: '2026-12-17 10:09 PM', location: 'Gym', bookings: '3/5' },
            { id: 2, name: 'Evening Yoga', activity: 'Yoga', datetime: '2026-12-14 10:02 AM', location: 'Studio A', bookings: '6/10' }
        ];

        function renderSessions() {
            const tbody = document.getElementById('sessionsTable');
            tbody.innerHTML = sessions.map(session => `
        <tr class="hover:bg-gray-50">
          <td class="px-6 py-4 text-sm text-gray-900">${session.name}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${session.activity}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${session.datetime}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${session.location}</td>
          <td class="px-6 py-4 text-sm text-gray-900">${session.bookings}</td>
          <td class="px-6 py-4 text-sm space-x-2">
            <button onclick="editSession(${session.id})" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200">Edit</button>
            <button onclick="viewSession(${session.id})" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200">View</button>
            <button onclick="deleteSession(${session.id})" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">Delete</button>
          </td>
        </tr>
      `).join('');
        }

        function editSession(id) {
            navigateTo('edit-session.html?id=' + id);
        }

        function viewSession(id) {
            navigateTo('session-bookings.html?id=' + id);
        }

        function deleteSession(id) {
            if (confirm('Are you sure you want to delete this session?')) {
                showToast('Session deleted successfully', 'success');
                const index = sessions.findIndex(s => s.id === id);
                if (index > -1) {
                    sessions.splice(index, 1);
                    renderSessions();
                }
            }
        }

        renderSessions();
    </script>
</body>

</html>
