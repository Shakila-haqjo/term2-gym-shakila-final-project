<!-- html-version/pages/trainer/create-session.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Session - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <span class="text-lg font-bold text-blue-600">High Street Gym</span>
                </div>
            </div>

            <nav class="flex-1 px-3 py-4">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Dashboard</span>
                </a>
                <a href="sessions.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>My Sessions</span>
                </a>
                <a href="blog.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>My Blog</span>
                </a>
                <a href="profile.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="p-3">
                <button onclick="logout()"
                    class="w-full text-red-600 hover:bg-red-50 px-4 py-3 rounded-lg transition-colors border border-red-200">
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-white">

            <!-- Content -->
            <div class="p-12">
                <div class="max-w-4xl">

                    <h1 class="text-4xl font-bold text-gray-900 mb-12">Create New Session</h1>

                    <form id="createSessionForm" onsubmit="handleCreateSession(event)" class="space-y-6">

                        <!-- Session Name -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Session Name</label>
                            <input type="text" id="sessionName" placeholder="e.g., Morning Training" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-gray-500">
                        </div>

                        <!-- Activity Type & Location -->
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-900 mb-2">Activity Type</label>
                                <select id="activityType" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none text-gray-400">
                                    <option value="">Select Activity</option>
                                    <option value="Personal Training">Personal Training</option>
                                    <option value="Yoga">Yoga</option>
                                    <option value="Pilates">Pilates</option>
                                    <option value="HIIT">HIIT</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-900 mb-2">Location</label>
                                <select id="location" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none text-gray-400">
                                    <option value="">Select Location</option>
                                    <option value="Main Gym">Main Gym</option>
                                    <option value="Studio A">Studio A</option>
                                    <option value="Studio B">Studio B</option>
                                    <option value="Weight Room">Weight Room</option>
                                </select>
                            </div>
                        </div>

                        <!-- Date & Time -->
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-900 mb-2">Date</label>
                                <input type="text" id="date" placeholder="dd/mm/yyyy" onfocus="(this.type='date')"
                                    required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-gray-400">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-900 mb-2">Time</label>
                                <input type="text" id="time" placeholder="--:--:--" onfocus="(this.type='time')"
                                    required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-gray-400">
                            </div>
                        </div>

                        <!-- Duration & Max Participants -->
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-900 mb-2">Duration(minutes)</label>
                                <input type="number" id="duration" placeholder="60" min="15" step="15" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-gray-400">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-900 mb-2">Max Participants</label>
                                <input type="number" id="maxParticipants" placeholder="5" min="1" required
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none text-gray-400">
                            </div>
                        </div>

                        <!-- Description -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Description</label>
                            <textarea id="description" rows="5" placeholder="Describe your session...."
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none text-gray-400"></textarea>
                        </div>

                        <!-- Buttons -->
                        <div class="flex gap-4">
                            <button type="submit"
                                class="px-16 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                                Create Session
                            </button>
                            <button type="button" onclick="navigateTo('sessions.html')"
                                class="px-8 py-3 text-blue-600 rounded-lg font-semibold hover:bg-blue-50 transition-colors">
                                Cancel
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </main>

    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();
        protectPage('trainer');

        function handleCreateSession(event) {
            event.preventDefault();
            showToast('Session created successfully!', 'success');
            setTimeout(() => navigateTo('sessions.html'), 1500);
        }
    </script>
</body>

</html>
