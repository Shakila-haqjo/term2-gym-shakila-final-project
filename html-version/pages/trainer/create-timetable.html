<!-- pages/trainer/create-timetable.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Timetable - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="timetables.html" class="text-gray-700 hover:text-blue-600">My Timetables</a>
                    <a href="blogs.html" class="text-gray-700 hover:text-blue-600">Blogs</a>
                    <button data-logout class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-3xl">
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Create New Timetable</h2>
            <p class="text-gray-600 mt-2">Set up a new training timetable for members</p>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
            <form id="createTimetableForm" class="space-y-6">
                <!-- Timetable Name -->
                <div>
                    <label for="timetableName" class="block text-sm font-medium text-gray-700 mb-2">
                        Timetable Name *
                    </label>
                    <input type="text" id="timetableName" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="e.g., Morning HIIT Training">
                </div>

                <!-- Activity -->
                <div>
                    <label for="activity" class="block text-sm font-medium text-gray-700 mb-2">
                        Activity Type *
                    </label>
                    <select id="activity" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent appearance-auto cursor-pointer bg-white">
                        <option value="">Select an activity</option>
                    </select>
                </div>

                <!-- Location -->
                <div>
                    <label for="location" class="block text-sm font-medium text-gray-700 mb-2">
                        Location *
                    </label>
                    <select id="location" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">Select a location</option>
                    </select>
                </div>

                <!-- Date and Time -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="timetableDate" class="block text-sm font-medium text-gray-700 mb-2">
                            Date *
                        </label>
                        <input type="date" id="timetableDate" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label for="timetableTime" class="block text-sm font-medium text-gray-700 mb-2">
                            Time *
                        </label>
                        <input type="time" id="timetableTime" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>

                <!-- Duration and Max Participants -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="duration" class="block text-sm font-medium text-gray-700 mb-2">
                            Duration (minutes) *
                        </label>
                        <input type="number" id="duration" required min="15" step="15" value="60"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label for="maxParticipants" class="block text-sm font-medium text-gray-700 mb-2">
                            Max Participants *
                        </label>
                        <input type="number" id="maxParticipants" required min="1" max="50" value="10"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-2">
                        Description
                    </label>
                    <textarea id="description" rows="4"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Add details about the timetable, what to bring, skill level, etc."></textarea>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p class="font-semibold">Error</p>
                    <p id="errorText"></p>
                </div>

                <!-- Buttons -->
                <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200">
                    <a href="timetables.html"
                        class="px-6 py-3 text-gray-700 bg-gray-100 font-semibold rounded-lg hover:bg-gray-200 transition-colors">
                        Cancel
                    </a>
                    <button type="submit" id="submitBtn"
                        class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                        Create Timetable
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Check authentication
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'trainer') {
            window.location.href = '../guest/login.html';
        }

        // Logout handler
        document.querySelector('[data-logout]').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        // Set minimum date to today
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('timetableDate').setAttribute('min', today);

        // Fetch activities
        async function fetchActivities() {
            try {
                const response = await fetch(`${API_URL}/activities`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch activities');

                const activities = await response.json();
                const select = document.getElementById('activity');

                activities.forEach(activity => {
                    const option = document.createElement('option');
                    option.value = activity.id || activity.activity_id;
                    option.textContent = activity.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error fetching activities:', error);
                showError('Failed to load activities');
            }
        }

        // Fetch locations
        async function fetchLocations() {
            try {
                const response = await fetch(`${API_URL}/locations`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch locations');

                const locations = await response.json();
                const select = document.getElementById('location');

                locations.forEach(location => {
                    const option = document.createElement('option');
                    option.value = location.id || location.location_id;
                    option.textContent = location.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error fetching locations:', error);
                showError('Failed to load locations');
            }
        }

        // Handle form submission
        document.getElementById('createTimetableForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating...';

            const formData = {
                timetable_name: document.getElementById('timetableName').value,
                activity_id: parseInt(document.getElementById('activity').value),
                location_id: parseInt(document.getElementById('location').value),
                timetable_date: document.getElementById('timetableDate').value,
                timetable_time: document.getElementById('timetableTime').value,
                duration: parseInt(document.getElementById('duration').value),
                max_participants: parseInt(document.getElementById('maxParticipants').value),
                description: document.getElementById('description').value || null
            };

            try {
                const response = await fetch(`${API_URL}/timetables`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create timetable');
                }

                alert('Timetable created successfully!');
                window.location.href = 'timetables.html';
            } catch (error) {
                console.error('Error creating timetable:', error);
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Timetable';
            }
        });

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');

            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        // Initialize
        Promise.all([fetchActivities(), fetchLocations()]);
    </script>
</body>

</html>
