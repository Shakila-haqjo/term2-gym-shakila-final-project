<!-- pages/trainer/session-bookings.html -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Bookings - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="sessions.html" class="text-gray-700 hover:text-blue-600">My Sessions</a>
                    <a href="profile.html" class="text-gray-700 hover:text-blue-600">Profile</a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <!-- Back Button -->
        <div class="mb-6">
            <a href="sessions.html" class="inline-flex items-center text-blue-600 hover:text-blue-800">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Sessions
            </a>
        </div>

        <!-- Session Info Card -->
        <div id="sessionInfo" class="bg-white rounded-lg shadow-md p-6 mb-6 hidden">
            <!-- Session details will be populated here -->
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading bookings...</p>
        </div>

        <!-- Bookings Table -->
        <div id="bookingsContainer" class="bg-white rounded-lg shadow-md overflow-hidden hidden">
            <div class="p-6 border-b border-gray-200">
                <h3 class="text-xl font-bold text-gray-800">Participants</h3>
                <p class="text-sm text-gray-600 mt-1">
                    <span id="bookingCount">0</span> / <span id="maxParticipants">0</span> spots filled
                </p>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Name
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Email
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Phone
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Booked On
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Status
                            </th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Bookings will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z">
                </path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Bookings Yet</h3>
            <p class="mt-2 text-gray-600">This session has no participants</p>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let sessionId = null;

        // Check authentication
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'trainer') {
            window.location.href = '../guest/login.html';
        }

        // Get session ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        sessionId = urlParams.get('id');

        if (!sessionId) {
            window.location.href = 'sessions.html';
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        // Fetch session details
        async function fetchSession() {
            try {
                const response = await fetch(`${API_URL}/sessions/${sessionId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch session');

                const session = await response.json();
                displaySessionInfo(session);
            } catch (error) {
                console.error('Error fetching session:', error);
                showError('Failed to load session details');
            }
        }

        // Display session information
        function displaySessionInfo(session) {
            const sessionInfo = document.getElementById('sessionInfo');
            const sessionDate = new Date(session.session_date);
            const formattedDate = sessionDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            sessionInfo.innerHTML = `
                <div class="flex flex-col md:flex-row md:justify-between md:items-start">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">${session.session_name}</h2>
                        <div class="space-y-2 text-gray-600">
                            <div class="flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                                </svg>
                                <span>${formattedDate}</span>
                            </div>
                            <div class="flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                                <span>${session.session_time} (${session.duration} mins)</span>
                            </div>
                            <div class="flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                </svg>
                                <span>${session.location_name}</span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 md:mt-0">
                        <span class="inline-block px-4 py-2 bg-blue-100 text-blue-800 font-semibold rounded-full">
                            ${session.activity_name}
                        </span>
                    </div>
                </div>
            `;

            sessionInfo.classList.remove('hidden');
            document.getElementById('maxParticipants').textContent = session.max_participants;
        }

        // Fetch bookings for session
        async function fetchBookings() {
            try {
                const response = await fetch(`${API_URL}/sessions/${sessionId}/bookings`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch bookings');

                const bookings = await response.json();
                displayBookings(bookings);
            } catch (error) {
                console.error('Error fetching bookings:', error);
                showError('Failed to load bookings');
            }
        }

        // Display bookings
        function displayBookings(bookings) {
            const loading = document.getElementById('loadingState');
            const container = document.getElementById('bookingsContainer');
            const empty = document.getElementById('emptyState');
            const tableBody = document.getElementById('bookingsTableBody');

            loading.classList.add('hidden');

            // Filter confirmed bookings only
            const confirmedBookings = bookings.filter(b => b.status === 'confirmed');

            if (confirmedBookings.length === 0) {
                container.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            container.classList.remove('hidden');

            document.getElementById('bookingCount').textContent = confirmedBookings.length;
            tableBody.innerHTML = '';

            confirmedBookings.forEach(booking => {
                const row = createBookingRow(booking);
                tableBody.appendChild(row);
            });
        }

        // Create booking table row
        function createBookingRow(booking) {
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-gray-50';

            const bookingDate = new Date(booking.booking_date);
            const formattedBookingDate = bookingDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center">
                            <span class="text-blue-600 font-semibold">
                                ${booking.user_name ? booking.user_name.split(' ').map(n => n[0]).join('') : 'NA'}
                            </span>
                        </div>
                        <div class="ml-4">
                            <div class="text-sm font-medium text-gray-900">
                                ${booking.user_name || 'Unknown User'}
                            </div>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm text-gray-900">${booking.user_email || 'N/A'}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm text-gray-900">${booking.user_phone || 'N/A'}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm text-gray-900">${formattedBookingDate}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                        Confirmed
                    </span>
                </td>
            `;

            return tr;
        }

        // Show error message
        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Retry
                    </button>
                </div>
            `;
        }

        // Initialize
        Promise.all([fetchSession(), fetchBookings()]);
    </script>
</body>

</html>
