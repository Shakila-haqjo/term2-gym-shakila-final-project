<!-- html-version/pages/trainer/blog.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog Posts - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <span class="text-lg font-bold text-blue-600">High Street Gym</span>
                </div>
            </div>

            <nav class="flex-1 px-3 py-4">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Dashboard</span>
                </a>
                <a href="sessions.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>My Sessions</span>
                </a>
                <a href="blog.html" class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 bg-blue-600 text-white">
                    <span>My Blog</span>
                </a>
                <a href="profile.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="p-3">
                <button onclick="logout()"
                    class="w-full text-red-600 hover:bg-red-50 px-4 py-3 rounded-lg transition-colors">
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-white">

            <!-- Header -->
            <header class="bg-white border-b border-gray-200 px-8 py-6 flex items-center justify-between">
                <h1 class="text-2xl font-bold text-gray-900">My Blog Posts</h1>
                <button onclick="navigateTo('create-blog.html')"
                    class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">
                    + Create New Session
                </button>
            </header>

            <!-- Blog Posts Table -->
            <div class="p-8">
                <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Title</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Category
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date
                                    Published</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="blogTable" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>

        </main>

    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();
        protectPage('trainer');

        const blogPosts = [
            { id: 1, title: '10 Tips for Building Muscle', category: 'Training', date: '2026-02-22', status: 'Published' },
            { id: 2, title: 'Nutrition Guide for Athletes', category: 'Nutrition', date: '2026-12-24', status: 'Draft' }
        ];

        function renderBlogPosts() {
            const tbody = document.getElementById('blogTable');
            tbody.innerHTML = blogPosts.map(post => {
                const statusColor = post.status === 'Published' ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700';
                return `
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 text-sm text-gray-900">${post.title}</td>
            <td class="px-6 py-4 text-sm text-gray-900">${post.category}</td>
            <td class="px-6 py-4 text-sm text-gray-900">${post.date}</td>
            <td class="px-6 py-4">
              <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusColor}">${post.status}</span>
            </td>
            <td class="px-6 py-4 text-sm space-x-2">
              <button onclick="editBlog(${post.id})" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200">Edit</button>
              <button onclick="deleteBlog(${post.id})" class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600">Delete</button>
            </td>
          </tr>
        `;
            }).join('');
        }

        function editBlog(id) {
            navigateTo('edit-blog.html?id=' + id);
        }

        function deleteBlog(id) {
            if (confirm('Are you sure you want to delete this blog post?')) {
                showToast('Blog post deleted successfully', 'success');
                const index = blogPosts.findIndex(b => b.id === id);
                if (index > -1) {
                    blogPosts.splice(index, 1);
                    renderBlogPosts();
                }
            }
        }

        renderBlogPosts();
    </script>
</body>

</html>
