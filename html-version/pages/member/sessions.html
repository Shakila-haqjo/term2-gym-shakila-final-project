<!-- html-version/pages/member/sessions.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <i data-lucide="dumbbell" class="h-6 w-6 text-indigo-600"></i>
                    <span class="text-lg font-bold text-gray-900">Member Portal</span>
                </div>
            </div>

            <nav class="flex-1 px-3 py-4">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <i data-lucide="home" class="h-5 w-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="profile.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <i data-lucide="user" class="h-5 w-5"></i>
                    <span>My Profile</span>
                </a>
                <a href="sessions.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 bg-indigo-600 text-white">
                    <i data-lucide="calendar" class="h-5 w-5"></i>
                    <span>Sessions</span>
                </a>
                <a href="bookings.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <i data-lucide="book-open" class="h-5 w-5"></i>
                    <span>My Bookings</span>
                </a>
                <a href="create-blog.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <i data-lucide="file-text" class="h-5 w-5"></i>
                    <span>Blog</span>
                </a>
            </nav>

            <div class="p-3 border-t border-gray-200">
                <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50 transition-colors">
                    <i data-lucide="log-out" class="h-5 w-5"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">

            <!-- Header -->
            <header class="bg-white border-b border-gray-200 px-8 py-6">
                <h1 class="text-3xl font-bold text-gray-900">Available Sessions</h1>
                <p class="text-gray-600 mt-1">Browse and book training sessions</p>
            </header>

            <!-- Content -->
            <div class="p-8">

                <!-- Filters -->
                <div class="bg-white rounded-xl shadow-sm p-6 mb-8">
                    <div class="grid md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Activity</label>
                            <select
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option>All Activities</option>
                                <option>Yoga</option>
                                <option>Pilates</option>
                                <option>HIIT</option>
                                <option>Strength Training</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Trainer</label>
                            <select
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option>All Trainers</option>
                                <option>Sarah Johnson</option>
                                <option>Mike Davis</option>
                                <option>Emma Wilson</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                            <input type="date"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Time</label>
                            <select
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option>Any Time</option>
                                <option>Morning (6AM-12PM)</option>
                                <option>Afternoon (12PM-6PM)</option>
                                <option>Evening (6PM-10PM)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Sessions Grid -->
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="sessionsGrid"></div>

            </div>

        </main>

    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();
        protectPage('member');

        const sessions = [
            { id: 1, activity: 'Yoga', trainer: 'Sarah Johnson', date: '2024-03-20', time: '10:00 AM', duration: '60 min', spots: 8, location: 'Studio A' },
            { id: 2, activity: 'HIIT Training', trainer: 'Mike Davis', date: '2024-03-20', time: '6:00 PM', duration: '45 min', spots: 5, location: 'Main Gym' },
            { id: 3, activity: 'Pilates', trainer: 'Emma Wilson', date: '2024-03-21', time: '9:00 AM', duration: '60 min', spots: 10, location: 'Studio B' },
            { id: 4, activity: 'Strength Training', trainer: 'Mike Davis', date: '2024-03-22', time: '7:00 AM', duration: '90 min', spots: 6, location: 'Weight Room' },
            { id: 5, activity: 'Yoga', trainer: 'Sarah Johnson', date: '2024-03-22', time: '5:00 PM', duration: '60 min', spots: 8, location: 'Studio A' },
            { id: 6, activity: 'HIIT Training', trainer: 'Emma Wilson', date: '2024-03-23', time: '8:00 AM', duration: '45 min', spots: 4, location: 'Main Gym' }
        ];

        function renderSessions() {
            const grid = document.getElementById('sessionsGrid');
            grid.innerHTML = sessions.map(session => `
        <div class="bg-white rounded-xl shadow-sm p-6 hover:shadow-lg transition-shadow">
          <div class="flex items-start justify-between mb-4">
            <div>
              <h3 class="text-xl font-bold text-gray-900 mb-1">${session.activity}</h3>
              <p class="text-sm text-gray-600">with ${session.trainer}</p>
            </div>
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold">${session.spots} spots left</span>
          </div>
          
          <div class="space-y-3 mb-6">
            <div class="flex items-center gap-2 text-gray-600">
              <i data-lucide="calendar" class="h-4 w-4"></i>
              <span class="text-sm">${formatDate(session.date)}</span>
            </div>
            <div class="flex items-center gap-2 text-gray-600">
              <i data-lucide="clock" class="h-4 w-4"></i>
              <span class="text-sm">${session.time} (${session.duration})</span>
            </div>
            <div class="flex items-center gap-2 text-gray-600">
              <i data-lucide="map-pin" class="h-4 w-4"></i>
              <span class="text-sm">${session.location}</span>
            </div>
          </div>

          <button onclick="bookSession(${session.id})" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">
            Book Session
          </button>
        </div>
      `).join('');
            lucide.createIcons();
        }

        function bookSession(id) {
            const session = sessions.find(s => s.id === id);
            if (confirm(`Book ${session.activity} session on ${formatDate(session.date)} at ${session.time}?`)) {
                showToast('Session booked successfully!', 'success');
                setTimeout(() => navigateTo('bookings.html'), 1500);
            }
        }

        renderSessions();
    </script>
</body>

</html>
