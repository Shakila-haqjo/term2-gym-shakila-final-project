<!-- pages/member/sessions.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Sessions - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="bookings.html" class="text-gray-700 hover:text-blue-600">My Bookings</a>
                    <a href="profile.html" class="text-gray-700 hover:text-blue-600">Profile</a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Available Sessions</h2>
            <p class="text-gray-600 mt-2">Browse and book upcoming fitness sessions</p>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Activity</label>
                    <select id="activityFilter"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">All Activities</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Location</label>
                    <select id="locationFilter"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">All Locations</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                    <input type="date" id="dateFilter"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading sessions...</p>
        </div>

        <!-- Sessions Grid -->
        <div id="sessionsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Sessions will be populated here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Sessions Found</h3>
            <p class="mt-2 text-gray-600">Try adjusting your filters or check back later</p>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allSessions = [];
        let activities = [];
        let locations = [];

        // Check authentication
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '../guest/login.html';
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        // Fetch sessions from API
        async function fetchSessions() {
            try {
                const response = await fetch(`${API_URL}/sessions/upcoming`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch sessions');

                allSessions = await response.json();
                displaySessions(allSessions);
            } catch (error) {
                console.error('Error fetching sessions:', error);
                showError('Failed to load sessions');
            }
        }

        // Fetch activities for filter
        async function fetchActivities() {
            try {
                const response = await fetch(`${API_URL}/activities`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch activities');

                activities = await response.json();
                populateActivityFilter();
            } catch (error) {
                console.error('Error fetching activities:', error);
            }
        }

        // Fetch locations for filter
        async function fetchLocations() {
            try {
                const response = await fetch(`${API_URL}/locations`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch locations');

                locations = await response.json();
                populateLocationFilter();
            } catch (error) {
                console.error('Error fetching locations:', error);
            }
        }

        // Populate activity filter dropdown
        function populateActivityFilter() {
            const select = document.getElementById('activityFilter');
            activities.forEach(activity => {
                const option = document.createElement('option');
                option.value = activity.id || activity.activity_id;
                option.textContent = activity.name;
                select.appendChild(option);
            });
        }

        // Populate location filter dropdown
        function populateLocationFilter() {
            const select = document.getElementById('locationFilter');
            locations.forEach(location => {
                const option = document.createElement('option');
                option.value = location.id || location.location_id;
                option.textContent = location.name;
                select.appendChild(option);
            });
        }

        // Display sessions
        function displaySessions(sessions) {
            const grid = document.getElementById('sessionsGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.classList.add('hidden');

            if (sessions.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.classList.remove('hidden');
            grid.innerHTML = '';

            sessions.forEach(session => {
                const sessionCard = createSessionCard(session);
                grid.appendChild(sessionCard);
            });
        }

        // Create session card element
        function createSessionCard(session) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md hover:shadow-xl transition-shadow overflow-hidden';

            const availableSpots = session.max_participants - session.current_participants;
            const isFull = availableSpots <= 0;
            const sessionDate = new Date(session.session_date);
            const formattedDate = sessionDate.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });

            card.innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold text-gray-800">${session.session_name}</h3>
                        ${isFull ? '<span class="px-3 py-1 bg-red-100 text-red-800 text-sm font-semibold rounded-full">Full</span>' : '<span class="px-3 py-1 bg-green-100 text-green-800 text-sm font-semibold rounded-full">Available</span>'}
                    </div>

                    <div class="space-y-2 text-gray-600 mb-4">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span>${session.trainer_name}</span>
                        </div>
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span>${formattedDate}</span>
                        </div>
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span>${session.session_time} (${session.duration} mins)</span>
                        </div>
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            <span>${session.location_name}</span>
                        </div>
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                            <span>${availableSpots} spots available</span>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-200">
                        <span class="inline-block px-3 py-1 bg-blue-100 text-blue-800 text-sm font-semibold rounded-full">
                            ${session.activity_name}
                        </span>
                    </div>

                    <button 
                        onclick="bookSession(${session.id || session.session_id})" 
                        ${isFull ? 'disabled' : ''}
                        class="w-full mt-4 px-6 py-3 ${isFull ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'} text-white font-semibold rounded-lg transition-colors"
                    >
                        ${isFull ? 'Session Full' : 'Book Now'}
                    </button>
                </div>
            `;

            return card;
        }

        // Book session
        async function bookSession(sessionId) {
            try {
                const response = await fetch(`${API_URL}/bookings`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ session_id: sessionId })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to book session');
                }

                alert('Session booked successfully!');
                fetchSessions(); // Refresh the list
            } catch (error) {
                console.error('Error booking session:', error);
                alert(error.message);
            }
        }

        // Filter sessions
        function filterSessions() {
            const activityId = document.getElementById('activityFilter').value;
            const locationId = document.getElementById('locationFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            let filtered = allSessions;

            if (activityId) {
                filtered = filtered.filter(s => (s.activity_id || s.activity_id) == activityId);
            }

            if (locationId) {
                filtered = filtered.filter(s => (s.location_id || s.location_id) == locationId);
            }

            if (dateFilter) {
                filtered = filtered.filter(s => s.session_date.startsWith(dateFilter));
            }

            displaySessions(filtered);
        }

        // Show error message
        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Retry
                    </button>
                </div>
            `;
        }

        // Add event listeners for filters
        document.getElementById('activityFilter').addEventListener('change', filterSessions);
        document.getElementById('locationFilter').addEventListener('change', filterSessions);
        document.getElementById('dateFilter').addEventListener('change', filterSessions);

        // Initialize page
        Promise.all([
            fetchSessions(),
            fetchActivities(),
            fetchLocations()
        ]);
    </script>
</body>

</html>
