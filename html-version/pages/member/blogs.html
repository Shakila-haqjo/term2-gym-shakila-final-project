<!-- html-version/pages/member/blogs.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="timetables.html" class="text-gray-700 hover:text-blue-600">Timetables</a>
                    <a href="bookings.html" class="text-gray-700 hover:text-blue-600">Bookings</a>
                    <a href="blogs.html" class="text-blue-600 font-semibold">Blogs</a>
                    <button data-logout class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Fitness Blogs</h2>
                <p class="text-gray-600 mt-2">Read articles from our trainers</p>
            </div>
            <a href="create-blog.html" class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                + Write Blog Post
            </a>
        </div>

        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading blogs...</p>
        </div>

        <div id="blogsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        </div>

        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Blogs Found</h3>
            <p class="mt-2 text-gray-600">Be the first to write a blog post!</p>
            <a href="create-blog.html" class="mt-4 inline-block px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Write Blog Post
            </a>
        </div>
    </main>


    <script src="../../js/role-navigator.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api';

        const auth = RoleNavigator.protect('member');
        if (!auth) return;

        const { token, user } = auth;

        document.querySelector('[data-logout]').addEventListener('click', () => {
            RoleNavigator.logout();
        });

        async function fetchBlogs() {
            try {
                const response = await fetch(`${API_URL}/blogs`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch blogs');

                const blogs = await response.json();
                displayBlogs(blogs);
            } catch (error) {
                console.error('Error fetching blogs:', error);
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('emptyState').classList.remove('hidden');
            }
        }

        function displayBlogs(blogs) {
            const grid = document.getElementById('blogsGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.classList.add('hidden');

            if (blogs.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            grid.innerHTML = blogs.map(blog => {
                const createdDate = new Date(blog.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                return `
                    <div class="bg-white rounded-lg shadow-md hover:shadow-xl transition-shadow overflow-hidden">
                        <div class="p-6">
                            <h3 class="text-xl font-bold text-gray-800 mb-2">${blog.title}</h3>
                            <p class="text-gray-600 text-sm mb-4 line-clamp-3">${blog.content.substring(0, 150)}...</p>
                            <div class="flex items-center justify-between text-sm text-gray-500">
                                <span>By ${blog.author_name || 'Unknown'}</span>
                                <span>${createdDate}</span>
                            </div>
                            <a href="../guest/blog-detail.html?id=${blog.blog_id}" class="mt-4 block text-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                Read More
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        fetchBlogs();
    </script>
</body>

</html>
