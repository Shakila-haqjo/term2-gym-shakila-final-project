<!-- pages/member/create-blog.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog Post - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="sessions.html" class="text-gray-700 hover:text-blue-600">Sessions</a>
                    <a href="profile.html" class="text-gray-700 hover:text-blue-600">Profile</a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Create Blog Post</h2>
            <p class="text-gray-600 mt-2">Share your fitness journey, tips, or experiences</p>
        </div>

        <div class="bg-white rounded-lg shadow-md p-6">
            <form id="createBlogForm" class="space-y-6">
                <!-- Title -->
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
                        Title *
                    </label>
                    <input type="text" id="title" required maxlength="200"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Enter a compelling title for your post">
                </div>

                <!-- Image URL (Optional) -->
                <div>
                    <label for="image" class="block text-sm font-medium text-gray-700 mb-2">
                        Featured Image URL (Optional)
                    </label>
                    <input type="url" id="image"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="https://example.com/image.jpg">
                    <p class="text-sm text-gray-500 mt-1">Add a URL to an image to make your post more engaging</p>
                </div>

                <!-- Content -->
                <div>
                    <label for="content" class="block text-sm font-medium text-gray-700 mb-2">
                        Content *
                    </label>
                    <textarea id="content" required rows="12"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        placeholder="Write your blog post content here..."></textarea>
                    <p class="text-sm text-gray-500 mt-1">
                        <span id="charCount">0</span> characters
                    </p>
                </div>

                <!-- Preview Section -->
                <div id="previewSection" class="hidden">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-gray-700">
                            Preview
                        </label>
                        <button type="button" id="hidePreview" class="text-sm text-blue-600 hover:text-blue-800">
                            Hide Preview
                        </button>
                    </div>
                    <div class="border border-gray-200 rounded-lg p-6 bg-gray-50">
                        <h3 id="previewTitle" class="text-2xl font-bold text-gray-800 mb-4"></h3>
                        <div id="previewContent" class="text-gray-700 whitespace-pre-wrap"></div>
                    </div>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p class="font-semibold">Error</p>
                    <p id="errorText"></p>
                </div>

                <!-- Success Message -->
                <div id="successMessage"
                    class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg">
                    <p class="font-semibold">Success!</p>
                    <p>Your blog post has been published successfully.</p>
                </div>

                <!-- Buttons -->
                <div class="flex flex-wrap gap-4 pt-4 border-t border-gray-200">
                    <button type="button" id="previewBtn"
                        class="px-6 py-3 text-gray-700 bg-gray-100 font-semibold rounded-lg hover:bg-gray-200 transition-colors">
                        Preview
                    </button>
                    <button type="submit" id="submitBtn"
                        class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                        Publish Post
                    </button>
                    <a href="dashboard.html"
                        class="px-6 py-3 text-gray-700 bg-white border border-gray-300 font-semibold rounded-lg hover:bg-gray-50 transition-colors">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Check authentication
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '../guest/login.html';
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        // Character counter
        const contentTextarea = document.getElementById('content');
        const charCount = document.getElementById('charCount');

        contentTextarea.addEventListener('input', () => {
            charCount.textContent = contentTextarea.value.length;
        });

        // Preview functionality
        document.getElementById('previewBtn').addEventListener('click', () => {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (!title || !content) {
                showError('Please fill in title and content to preview');
                return;
            }

            document.getElementById('previewTitle').textContent = title;
            document.getElementById('previewContent').textContent = content;
            document.getElementById('previewSection').classList.remove('hidden');

            // Scroll to preview
            document.getElementById('previewSection').scrollIntoView({ behavior: 'smooth' });
        });

        document.getElementById('hidePreview').addEventListener('click', () => {
            document.getElementById('previewSection').classList.add('hidden');
        });

        // Handle form submission
        document.getElementById('createBlogForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Publishing...';

            const formData = {
                title: document.getElementById('title').value.trim(),
                content: document.getElementById('content').value.trim(),
                image: document.getElementById('image').value.trim() || null
            };

            try {
                const response = await fetch(`${API_URL}/blogs`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to create blog post');
                }

                // Show success message
                document.getElementById('successMessage').classList.remove('hidden');
                document.getElementById('createBlogForm').reset();
                charCount.textContent = '0';

                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = `../guest/blog-detail.html?id=${data.id}`;
                }, 2000);

            } catch (error) {
                console.error('Error creating blog post:', error);
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Publish Post';
            }
        });

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');

            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>

</html>
