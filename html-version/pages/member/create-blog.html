<!-- html-version/pages/member/create-blog.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Blog Post - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <i data-lucide="dumbbell" class="h-6 w-6 text-indigo-600"></i>
                    <span class="text-lg font-bold text-gray-900">High Street Gym</span>
                </div>
            </div>

            <nav class="flex-1 px-3 py-4">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Dashboard</span>
                </a>
                <a href="sessions.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Browse Sessions</span>
                </a>
                <a href="bookings.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>My Bookings</span>
                </a>
                <a href="create-blog.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 bg-blue-600 text-white">
                    <span>Create Blog</span>
                </a>
                <a href="profile.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <span>Profile</span>
                </a>
            </nav>

            <div class="p-3 border-t border-gray-200">
                <button onclick="logout()"
                    class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50 transition-colors border border-red-200">
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto bg-gray-50">

            <!-- Header -->
            <header class="bg-white px-8 py-4 border-b border-gray-200">
                <h1 class="text-2xl font-bold text-gray-900">Blog</h1>
            </header>

            <!-- Content -->
            <div class="p-8">
                <div class="max-w-4xl">

                    <h2 class="text-3xl font-bold text-gray-900 mb-8">Create New Blog Post</h2>

                    <form id="blogForm" onsubmit="handleBlogSubmit(event)" class="space-y-6">

                        <!-- Title -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Title</label>
                            <input type="text" id="title" placeholder="Enter Blog Title" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                        </div>

                        <!-- Category -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Category</label>
                            <select id="category" required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none appearance-none bg-white">
                                <option value="">Select category</option>
                                <option value="training">Training</option>
                                <option value="nutrition">Nutrition</option>
                                <option value="wellness">Wellness</option>
                                <option value="motivation">Motivation</option>
                            </select>
                        </div>

                        <!-- Upload Image -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Upload Image</label>
                            <input type="file" id="image" accept="image/*"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                        </div>

                        <!-- Content -->
                        <div>
                            <label class="block text-sm font-medium text-gray-900 mb-2">Content</label>
                            <textarea id="content" rows="12" placeholder="Write your blog content here...." required
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none"></textarea>
                        </div>

                        <!-- Buttons -->
                        <div class="flex gap-4">
                            <button type="submit"
                                class="px-8 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                                Publish
                            </button>
                            <button type="button" onclick="saveDraft()"
                                class="px-8 py-3 text-blue-600 rounded-lg font-semibold hover:bg-blue-50 transition-colors">
                                Save as Draft
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </main>

    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();
        protectPage('member');

        function handleBlogSubmit(event) {
            event.preventDefault();
            showToast('Blog post published successfully!', 'success');
            setTimeout(() => navigateTo('dashboard.html'), 1500);
        }

        function saveDraft() {
            showToast('Blog post saved as draft', 'success');
        }
    </script>
</body>

</html>
