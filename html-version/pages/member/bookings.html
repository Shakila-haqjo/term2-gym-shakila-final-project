<!-- html-version/pages/member/bookings.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <i data-lucide="dumbbell" class="h-6 w-6 text-indigo-600"></i>
                    <span class="text-lg font-bold text-gray-900">Member Portal</span>
                </div>
            </div>

            <nav class="flex-1 px-3 py-4">
                <a href="dashboard.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <i data-lucide="home" class="h-5 w-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="profile.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <i data-lucide="user" class="h-5 w-5"></i>
                    <span>My Profile</span>
                </a>
                <a href="sessions.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <i data-lucide="calendar" class="h-5 w-5"></i>
                    <span>Sessions</span>
                </a>
                <a href="bookings.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 bg-indigo-600 text-white">
                    <i data-lucide="book-open" class="h-5 w-5"></i>
                    <span>My Bookings</span>
                </a>
                <a href="create-blog.html"
                    class="flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100">
                    <i data-lucide="file-text" class="h-5 w-5"></i>
                    <span>Blog</span>
                </a>
            </nav>

            <div class="p-3 border-t border-gray-200">
                <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50 transition-colors">
                    <i data-lucide="log-out" class="h-5 w-5"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">

            <!-- Header -->
            <header class="bg-white border-b border-gray-200 px-8 py-6">
                <h1 class="text-3xl font-bold text-gray-900">My Bookings</h1>
                <p class="text-gray-600 mt-1">View and manage your session bookings</p>
            </header>

            <!-- Content -->
            <div class="p-8">

                <!-- Tabs -->
                <div class="flex gap-4 mb-8 border-b border-gray-200">
                    <button onclick="showTab('upcoming')" id="upcomingTab"
                        class="px-4 py-2 font-semibold text-indigo-600 border-b-2 border-indigo-600">
                        Upcoming
                    </button>
                    <button onclick="showTab('past')" id="pastTab"
                        class="px-4 py-2 font-semibold text-gray-500 hover:text-gray-700">
                        Past
                    </button>
                    <button onclick="showTab('cancelled')" id="cancelledTab"
                        class="px-4 py-2 font-semibold text-gray-500 hover:text-gray-700">
                        Cancelled
                    </button>
                </div>

                <!-- Upcoming Bookings -->
                <div id="upcomingContent" class="space-y-4"></div>

                <!-- Past Bookings -->
                <div id="pastContent" class="space-y-4 hidden"></div>

                <!-- Cancelled Bookings -->
                <div id="cancelledContent" class="space-y-4 hidden"></div>

            </div>

        </main>

    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();
        protectPage('member');

        const bookings = {
            upcoming: [
                { id: 1, activity: 'Yoga', trainer: 'Sarah Johnson', date: '2024-03-20', time: '10:00 AM', duration: '60 min', location: 'Studio A', status: 'confirmed' },
                { id: 2, activity: 'HIIT Training', trainer: 'Mike Davis', date: '2024-03-22', time: '6:00 PM', duration: '45 min', location: 'Main Gym', status: 'confirmed' },
                { id: 3, activity: 'Pilates', trainer: 'Emma Wilson', date: '2024-03-25', time: '9:00 AM', duration: '60 min', location: 'Studio B', status: 'confirmed' }
            ],
            past: [
                { id: 4, activity: 'Yoga', trainer: 'Sarah Johnson', date: '2024-03-10', time: '10:00 AM', duration: '60 min', location: 'Studio A', status: 'completed' },
                { id: 5, activity: 'Strength Training', trainer: 'Mike Davis', date: '2024-03-12', time: '7:00 AM', duration: '90 min', location: 'Weight Room', status: 'completed' }
            ],
            cancelled: [
                { id: 6, activity: 'HIIT Training', trainer: 'Emma Wilson', date: '2024-03-15', time: '8:00 AM', duration: '45 min', location: 'Main Gym', status: 'cancelled' }
            ]
        };

        function renderBooking(booking, showActions = true) {
            const statusColors = {
                confirmed: 'bg-green-100 text-green-700',
                completed: 'bg-blue-100 text-blue-700',
                cancelled: 'bg-red-100 text-red-700'
            };

            return `
        <div class="bg-white rounded-xl shadow-sm p-6">
          <div class="flex items-start justify-between">
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-4">
                <h3 class="text-xl font-bold text-gray-900">${booking.activity}</h3>
                <span class="${statusColors[booking.status]} px-3 py-1 rounded-full text-xs font-semibold capitalize">${booking.status}</span>
              </div>
              <p class="text-gray-600 mb-4">with ${booking.trainer}</p>
              
              <div class="grid md:grid-cols-4 gap-4 text-sm">
                <div class="flex items-center gap-2 text-gray-600">
                  <i data-lucide="calendar" class="h-4 w-4"></i>
                  <span>${formatDate(booking.date)}</span>
                </div>
                <div class="flex items-center gap-2 text-gray-600">
                  <i data-lucide="clock" class="h-4 w-4"></i>
                  <span>${booking.time}</span>
                </div>
                <div class="flex items-center gap-2 text-gray-600">
                  <i data-lucide="timer" class="h-4 w-4"></i>
                  <span>${booking.duration}</span>
                </div>
                <div class="flex items-center gap-2 text-gray-600">
                  <i data-lucide="map-pin" class="h-4 w-4"></i>
                  <span>${booking.location}</span>
                </div>
              </div>
            </div>
            
            ${showActions && booking.status === 'confirmed' ? `
              <div class="flex gap-2 ml-4">
                <button onclick="cancelBooking(${booking.id})" class="px-4 py-2 border border-red-300 text-red-600 rounded-lg hover:bg-red-50 transition-colors">
                  Cancel
                </button>
              </div>
            ` : ''}
          </div>
        </div>
      `;
        }

        function renderBookings() {
            document.getElementById('upcomingContent').innerHTML = bookings.upcoming.length > 0
                ? bookings.upcoming.map(b => renderBooking(b, true)).join('')
                : '<p class="text-gray-500 text-center py-8">No upcoming bookings</p>';

            document.getElementById('pastContent').innerHTML = bookings.past.length > 0
                ? bookings.past.map(b => renderBooking(b, false)).join('')
                : '<p class="text-gray-500 text-center py-8">No past bookings</p>';

            document.getElementById('cancelledContent').innerHTML = bookings.cancelled.length > 0
                ? bookings.cancelled.map(b => renderBooking(b, false)).join('')
                : '<p class="text-gray-500 text-center py-8">No cancelled bookings</p>';

            lucide.createIcons();
        }

        function showTab(tab) {
            document.getElementById('upcomingContent').classList.add('hidden');
            document.getElementById('pastContent').classList.add('hidden');
            document.getElementById('cancelledContent').classList.add('hidden');

            ['upcomingTab', 'pastTab', 'cancelledTab'].forEach(id => {
                const el = document.getElementById(id);
                el.classList.remove('text-indigo-600', 'border-b-2', 'border-indigo-600');
                el.classList.add('text-gray-500');
            });

            document.getElementById(tab + 'Content').classList.remove('hidden');
            const activeTab = document.getElementById(tab + 'Tab');
            activeTab.classList.add('text-indigo-600', 'border-b-2', 'border-indigo-600');
            activeTab.classList.remove('text-gray-500');
        }

        function cancelBooking(id) {
            if (confirm('Are you sure you want to cancel this booking?')) {
                showToast('Booking cancelled successfully', 'success');
                const index = bookings.upcoming.findIndex(b => b.id === id);
                if (index > -1) {
                    bookings.upcoming[index].status = 'cancelled';
                    bookings.cancelled.push(bookings.upcoming[index]);
                    bookings.upcoming.splice(index, 1);
                    renderBookings();
                }
            }
        }

        renderBookings();
    </script>
</body>

</html>
