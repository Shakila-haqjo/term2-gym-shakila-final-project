<!-- pages/member/bookings.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="sessions.html" class="text-gray-700 hover:text-blue-600">Browse Sessions</a>
                    <a href="profile.html" class="text-gray-700 hover:text-blue-600">Profile</a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-gray-800">My Bookings</h2>
            <p class="text-gray-600 mt-2">Manage your session bookings</p>
        </div>

        <!-- Tabs -->
        <div class="bg-white rounded-lg shadow-md mb-6">
            <div class="flex border-b">
                <button id="upcomingTab" class="px-6 py-4 font-semibold text-blue-600 border-b-2 border-blue-600">
                    Upcoming
                </button>
                <button id="pastTab" class="px-6 py-4 font-semibold text-gray-600 hover:text-blue-600">
                    Past
                </button>
                <button id="cancelledTab" class="px-6 py-4 font-semibold text-gray-600 hover:text-blue-600">
                    Cancelled
                </button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading bookings...</p>
        </div>

        <!-- Bookings List -->
        <div id="bookingsList" class="space-y-4 hidden">
            <!-- Bookings will be populated here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
                </path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Bookings Found</h3>
            <p class="mt-2 text-gray-600">You haven't booked any sessions yet</p>
            <a href="sessions.html"
                class="mt-4 inline-block px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                Browse Sessions
            </a>
        </div>
    </main>

    <!-- Cancel Confirmation Modal -->
    <div id="cancelModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Cancel Booking</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to cancel this booking? This action cannot be undone.
            </p>
            <div class="flex justify-end space-x-4">
                <button id="cancelModalClose" class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">
                    No, Keep It
                </button>
                <button id="confirmCancel" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                    Yes, Cancel Booking
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allBookings = [];
        let currentTab = 'upcoming';
        let bookingToCancel = null;

        // Check authentication
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '../guest/login.html';
        }

        // Logout handler
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        // Fetch bookings from API
        async function fetchBookings() {
            try {
                const response = await fetch(`${API_URL}/bookings/my-bookings`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to fetch bookings');

                allBookings = await response.json();
                displayBookings();
            } catch (error) {
                console.error('Error fetching bookings:', error);
                showError('Failed to load bookings');
            }
        }

        // Display bookings based on current tab
        function displayBookings() {
            const list = document.getElementById('bookingsList');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.classList.add('hidden');

            const now = new Date();
            let filteredBookings = [];

            if (currentTab === 'upcoming') {
                filteredBookings = allBookings.filter(b => {
                    const sessionDate = new Date(b.session_date);
                    return b.status === 'confirmed' && sessionDate >= now;
                });
            } else if (currentTab === 'past') {
                filteredBookings = allBookings.filter(b => {
                    const sessionDate = new Date(b.session_date);
                    return b.status === 'confirmed' && sessionDate < now;
                });
            } else if (currentTab === 'cancelled') {
                filteredBookings = allBookings.filter(b => b.status === 'cancelled');
            }

            if (filteredBookings.length === 0) {
                list.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.classList.remove('hidden');
            list.innerHTML = '';

            filteredBookings.forEach(booking => {
                const bookingCard = createBookingCard(booking);
                list.appendChild(bookingCard);
            });
        }

        // Create booking card element
        function createBookingCard(booking) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow';

            const sessionDate = new Date(booking.session_date);
            const formattedDate = sessionDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const bookingDate = new Date(booking.booking_date);
            const formattedBookingDate = bookingDate.toLocaleDateString('en-US');

            const statusColors = {
                confirmed: 'bg-green-100 text-green-800',
                cancelled: 'bg-red-100 text-red-800',
                completed: 'bg-blue-100 text-blue-800'
            };

            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="text-xl font-bold text-gray-800">${booking.session_name}</h3>
                        <p class="text-sm text-gray-500 mt-1">Booked on ${formattedBookingDate}</p>
                    </div>
                    <span class="px-3 py-1 ${statusColors[booking.status]} text-sm font-semibold rounded-full capitalize">
                        ${booking.status}
                    </span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="flex items-center text-gray-600">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <span>${formattedDate}</span>
                    </div>
                    <div class="flex items-center text-gray-600">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>${booking.session_time} (${booking.duration} mins)</span>
                    </div>
                    <div class="flex items-center text-gray-600">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span>${booking.trainer_name}</span>
                    </div>
                    <div class="flex items-center text-gray-600">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                        </svg>
                        <span>${booking.location_name}</span>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-200">
                    <span class="inline-block px-3 py-1 bg-blue-100 text-blue-800 text-sm font-semibold rounded-full">
                        ${booking.activity_name}
                    </span>
                </div>

                ${booking.status === 'confirmed' && currentTab === 'upcoming' ? `
                    <button 
                        onclick="showCancelModal(${booking.id || booking.booking_id})"
                        class="w-full mt-4 px-6 py-3 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition-colors"
                    >
                        Cancel Booking
                    </button>
                ` : ''}
            `;

            return card;
        }

        // Show cancel confirmation modal
        function showCancelModal(bookingId) {
            bookingToCancel = bookingId;
            document.getElementById('cancelModal').classList.remove('hidden');
        }

        // Hide cancel modal
        function hideCancelModal() {
            bookingToCancel = null;
            document.getElementById('cancelModal').classList.add('hidden');
        }

        // Cancel booking
        async function cancelBooking() {
            if (!bookingToCancel) return;

            try {
                const response = await fetch(`${API_URL}/bookings/${bookingToCancel}/cancel`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) throw new Error('Failed to cancel booking');

                hideCancelModal();
                alert('Booking cancelled successfully');
                fetchBookings();
            } catch (error) {
                console.error('Error cancelling booking:', error);
                alert('Failed to cancel booking');
            }
        }

        // Tab switching
        function switchTab(tab) {
            currentTab = tab;

            // Update tab styles
            document.querySelectorAll('[id$="Tab"]').forEach(btn => {
                btn.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
                btn.classList.add('text-gray-600');
            });

            document.getElementById(`${tab}Tab`).classList.remove('text-gray-600');
            document.getElementById(`${tab}Tab`).classList.add('text-blue-600', 'border-b-2', 'border-blue-600');

            displayBookings();
        }

        // Show error message
        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Retry
                    </button>
                </div>
            `;
        }

        // Event listeners
        document.getElementById('upcomingTab').addEventListener('click', () => switchTab('upcoming'));
        document.getElementById('pastTab').addEventListener('click', () => switchTab('past'));
        document.getElementById('cancelledTab').addEventListener('click', () => switchTab('cancelled'));
        document.getElementById('cancelModalClose').addEventListener('click', hideCancelModal);
        document.getElementById('confirmCancel').addEventListener('click', cancelBooking);

        // Initialize
        fetchBookings();
    </script>
</body>

</html>
