<!-- html-version/pages/member/profile.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <div class="flex items-center gap-2">
                    <i data-lucide="dumbbell" class="h-6 w-6 text-indigo-600"></i>
                    <span class="text-lg font-bold text-gray-900">Member Portal</span>
                </div>
            </div>

            <nav class="flex-1 px-3 py-4">
                <a href="dashboard.html"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100"
                    data-page="dashboard">
                    <i data-lucide="home" class="h-5 w-5"></i>
                    <span>Dashboard</span>
                </a>
                <a href="profile.html"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg mb-1 bg-indigo-600 text-white"
                    data-page="profile">
                    <i data-lucide="user" class="h-5 w-5"></i>
                    <span>My Profile</span>
                </a>
                <a href="sessions.html"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100"
                    data-page="sessions">
                    <i data-lucide="calendar" class="h-5 w-5"></i>
                    <span>Sessions</span>
                </a>
                <a href="bookings.html"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100"
                    data-page="bookings">
                    <i data-lucide="book-open" class="h-5 w-5"></i>
                    <span>My Bookings</span>
                </a>
                <a href="create-blog.html"
                    class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg mb-1 text-gray-700 hover:bg-gray-100"
                    data-page="blog">
                    <i data-lucide="file-text" class="h-5 w-5"></i>
                    <span>Blog</span>
                </a>
            </nav>

            <div class="p-3 border-t border-gray-200">
                <button onclick="logout()"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-600 hover:bg-red-50 transition-colors">
                    <i data-lucide="log-out" class="h-5 w-5"></i>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">

            <!-- Header -->
            <header class="bg-white border-b border-gray-200 px-8 py-6">
                <h1 class="text-3xl font-bold text-gray-900">My Profile</h1>
                <p class="text-gray-600 mt-1">Manage your personal information</p>
            </header>

            <!-- Profile Content -->
            <div class="p-8">

                <div class="max-w-4xl">

                    <!-- Profile Picture -->
                    <div class="bg-white rounded-xl shadow-sm p-8 mb-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-6">Profile Picture</h2>
                        <div class="flex items-center gap-6">
                            <div
                                class="w-24 h-24 bg-indigo-600 rounded-full flex items-center justify-center text-white text-3xl font-bold">
                                <span id="avatarInitial">M</span>
                            </div>
                            <div>
                                <button class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 mb-2">
                                    Upload New Photo
                                </button>
                                <p class="text-sm text-gray-500">JPG or PNG. Max size 5MB</p>
                            </div>
                        </div>
                    </div>

                    <!-- Personal Information -->
                    <div class="bg-white rounded-xl shadow-sm p-8 mb-6">
                        <h2 class="text-xl font-bold text-gray-900 mb-6">Personal Information</h2>
                        <form id="profileForm" onsubmit="handleProfileUpdate(event)">

                            <div class="grid md:grid-cols-2 gap-6 mb-6">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                                    <input type="text" value="John"
                                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                                    <input type="text" value="Doe"
                                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                </div>
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                                <input type="email" value="member@gym.com"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                                <input type="tel" value="+1 (555) 123-4567"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                                <input type="text" value="123 Main Street"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none mb-4">
                                <div class="grid md:grid-cols-3 gap-4">
                                    <input type="text" placeholder="City"
                                        class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                    <input type="text" placeholder="State"
                                        class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                    <input type="text" placeholder="ZIP"
                                        class="px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                </div>
                            </div>

                            <button type="submit"
                                class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 font-semibold">
                                Save Changes
                            </button>

                        </form>
                    </div>

                    <!-- Change Password -->
                    <div class="bg-white rounded-xl shadow-sm p-8">
                        <h2 class="text-xl font-bold text-gray-900 mb-6">Change Password</h2>
                        <form id="passwordForm" onsubmit="handlePasswordChange(event)">

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Current Password</label>
                                <input type="password"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                                <input type="password"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            </div>

                            <div class="mb-6">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password</label>
                                <input type="password"
                                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            </div>

                            <button type="submit"
                                class="bg-indigo-600 text-white px-6 py-3 rounded-lg hover:bg-indigo-700 font-semibold">
                                Update Password
                            </button>

                        </form>
                    </div>

                </div>

            </div>

        </main>

    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();
        protectPage('member');

        function handleProfileUpdate(event) {
            event.preventDefault();
            showToast('Profile updated successfully!', 'success');
        }

        function handlePasswordChange(event) {
            event.preventDefault();
            showToast('Password updated successfully!', 'success');
        }
    </script>
</body>

</html>
