<!-- html-version/pages/guest/reset-password.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-50">

    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">

            <!-- Logo and Title -->
            <div class="text-center mb-8">
                <div class="flex items-center justify-center gap-2 mb-4">
                    <i data-lucide="dumbbell" class="h-10 w-10 text-indigo-600"></i>
                    <span class="text-2xl font-bold text-gray-900">High Street Gym</span>
                </div>
                <h2 class="text-3xl font-bold text-gray-900 mb-2">Reset Password</h2>
                <p class="text-gray-600">Enter your email to receive a reset link</p>
            </div>

            <!-- Reset Form -->
            <div class="bg-white rounded-xl shadow-lg p-8">
                <form id="resetForm" onsubmit="handleResetSubmit(event)">

                    <!-- Email -->
                    <div class="mb-6">
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                        <input type="email" id="email" name="email" required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors"
                            placeholder="you@example.com">
                    </div>

                    <!-- Submit Button -->
                    <button type="submit"
                        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition-colors mb-4">
                        Send Reset Link
                    </button>

                    <!-- Back to Login -->
                    <a href="login.html" class="block text-center text-sm text-indigo-600 hover:text-indigo-700">
                        Back to Login
                    </a>

                </form>
            </div>

        </div>
    </div>

    <script src="../../js/main.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        lucide.createIcons();

        function handleResetSubmit(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            handlePasswordReset(email);
        }
    </script>
    <!-- Role-based navigation scripts -->
    <script src="../../js/role-navigator.js"></script>
    <script src="../../js/page-protection.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/main.js"></script>
</body>

</html>
