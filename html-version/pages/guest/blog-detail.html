<!-- pages/guest/blog-detail.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym</h1>
                <div class="space-x-4">
                    <a href="index.html" class="text-gray-700 hover:text-blue-600">Home</a>
                    <a href="blog.html" class="text-gray-700 hover:text-blue-600">Blog</a>
                    <a href="login.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <!-- Back Button -->
        <div class="mb-6">
            <a href="blog.html" class="inline-flex items-center text-blue-600 hover:text-blue-800">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Blog
            </a>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading blog post...</p>
        </div>

        <!-- Blog Post Content -->
        <article id="blogContent" class="max-w-4xl mx-auto bg-white rounded-lg shadow-md overflow-hidden hidden">
            <!-- Content will be populated here -->
        </article>
    </main>

    <footer class="bg-gray-800 text-white mt-16">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center">
                <p>&copy; 2024 High Street Gym. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let blogId = null;

        // Get blog ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        blogId = urlParams.get('id');

        if (!blogId) {
            window.location.href = 'blog.html';
        }

        // Fetch blog post
        async function fetchBlog() {
            try {
                const response = await fetch(`${API_URL}/blogs/${blogId}`);

                if (!response.ok) throw new Error('Failed to fetch blog post');

                const blog = await response.json();
                displayBlog(blog);
            } catch (error) {
                console.error('Error fetching blog:', error);
                showError('Failed to load blog post');
            }
        }

        // Display blog post
        function displayBlog(blog) {
            const content = document.getElementById('blogContent');
            const loading = document.getElementById('loadingState');

            loading.classList.add('hidden');
            content.classList.remove('hidden');

            const createdDate = new Date(blog.created_at);
            const formattedDate = createdDate.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            // Format content with proper line breaks
            const formattedContent = blog.content.replace(/\n/g, '<br>');

            content.innerHTML = `
                ${blog.image ? `
                    <div class="h-96 bg-gray-200 overflow-hidden">
                        <img src="${blog.image}" alt="${blog.title}" class="w-full h-full object-cover">
                    </div>
                ` : ''}
                
                <div class="p-8 md:p-12">
                    <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">
                        ${blog.title}
                    </h1>

                    <div class="flex items-center text-gray-600 mb-8 pb-8 border-b border-gray-200">
                        <div class="flex items-center">
                            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                                <span class="text-blue-600 font-semibold text-lg">
                                    ${blog.firstname[0]}${blog.lastname[0]}
                                </span>
                            </div>
                            <div>
                                <p class="font-semibold text-gray-800">${blog.firstname} ${blog.lastname}</p>
                                <p class="text-sm text-gray-500">${formattedDate}</p>
                            </div>
                        </div>
                    </div>

                    <div class="prose prose-lg max-w-none">
                        <div class="text-gray-700 leading-relaxed whitespace-pre-wrap">
                            ${formattedContent}
                        </div>
                    </div>

                    <div class="mt-12 pt-8 border-t border-gray-200">
                        <a href="blog.html" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-semibold">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                            </svg>
                            Back to All Posts
                        </a>
                    </div>
                </div>
            `;
        }

        // Show error message
        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="window.location.href='blog.html'" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                        Back to Blog
                    </button>
                </div>
            `;
        }

        // Initialize
        fetchBlog();
    </script>
</body>

</html>
