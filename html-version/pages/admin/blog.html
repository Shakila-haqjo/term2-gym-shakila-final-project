<!-- pages/admin/blog.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Blog - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym - Admin</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="users.html" class="text-gray-700 hover:text-blue-600">Users</a>
                    <a href="sessions.html" class="text-gray-700 hover:text-blue-600">Sessions</a>
                    <a href="activities.html" class="text-gray-700 hover:text-blue-600">Activities</a>
                    <a href="locations.html" class="text-gray-700 hover:text-blue-600">Locations</a>
                    <a href="bookings.html" class="text-gray-700 hover:text-blue-600">Bookings</a>
                    <button data-logout class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Manage Blog Posts</h2>
            <p class="text-gray-600 mt-2">View and manage all blog posts</p>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Author</label>
                    <select id="authorFilter"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">All Authors</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                    <input type="text" id="searchInput" placeholder="Search by title..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading blog posts...</p>
        </div>

        <!-- Blog Posts List -->
        <div id="blogsList" class="space-y-4 hidden">
            <!-- Blog posts will be populated here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                </path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Blog Posts Found</h3>
        </div>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Delete Blog Post</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to delete this blog post? This action cannot be undone.
            </p>
            <div class="flex justify-end space-x-4">
                <button id="deleteModalClose"
                    class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">Cancel</button>
                <button id="confirmDelete" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete
                    Post</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allBlogs = [];
        let authors = [];
        let blogToDelete = null;

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'admin') {
            window.location.href = '../guest/login.html';
        }

        document.querySelector('[data-logout]').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        async function fetchBlogs() {
            try {
                const response = await fetch(`${API_URL}/blogs`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch blogs');

                allBlogs = await response.json();

                // Extract unique authors
                const authorMap = new Map();
                allBlogs.forEach(blog => {
                    if (!authorMap.has(blog.user_id)) {
                        authorMap.set(blog.user_id, `${blog.firstname} ${blog.lastname}`);
                    }
                });
                authors = Array.from(authorMap, ([id, name]) => ({ id, name }));
                populateAuthorFilter();

                displayBlogs(allBlogs);
            } catch (error) {
                console.error('Error fetching blogs:', error);
                showError('Failed to load blog posts');
            }
        }

        function populateAuthorFilter() {
            const select = document.getElementById('authorFilter');
            authors.forEach(author => {
                const option = document.createElement('option');
                option.value = author.id;
                option.textContent = author.name;
                select.appendChild(option);
            });
        }

        function displayBlogs(blogs) {
            const loading = document.getElementById('loadingState');
            const list = document.getElementById('blogsList');
            const empty = document.getElementById('emptyState');

            loading.classList.add('hidden');

            if (blogs.length === 0) {
                list.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.classList.remove('hidden');
            list.innerHTML = '';

            blogs.forEach(blog => {
                const blogCard = createBlogCard(blog);
                list.appendChild(blogCard);
            });
        }

        function createBlogCard(blog) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow';

            const createdDate = new Date(blog.created_at);
            const formattedDate = createdDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            const preview = blog.content.length > 200 ? blog.content.substring(0, 200) + '...' : blog.content;

            card.innerHTML = `
                <div class="flex flex-col md:flex-row md:justify-between md:items-start mb-4">
                    <div class="flex-1">
                        <h3 class="text-xl font-bold text-gray-800 mb-2">${blog.title}</h3>
                        <p class="text-sm text-gray-500 mb-3">
                            By ${blog.firstname} ${blog.lastname} on ${formattedDate}
                        </p>
                        <p class="text-gray-600 mb-4">${preview}</p>
                    </div>
                    ${blog.image ? `
                        <div class="w-full md:w-32 h-32 md:ml-4 mb-4 md:mb-0 bg-gray-200 rounded-lg overflow-hidden flex-shrink-0">
                            <img src="${blog.image}" alt="${blog.title}" class="w-full h-full object-cover">
                        </div>
                    ` : ''}
                </div>

                <div class="flex flex-wrap gap-2 pt-4 border-t border-gray-200">
                    <a href="../guest/blog-detail.html?id=${blog.id}" target="_blank" class="px-4 py-2 bg-gray-100 text-gray-700 font-semibold rounded-lg hover:bg-gray-200 transition-colors">
                        View
                    </a>
                    <button onclick="showDeleteModal(${blog.id})" class="px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition-colors">
                        Delete
                    </button>
                </div>
            `;

            return card;
        }

        function showDeleteModal(blogId) {
            blogToDelete = blogId;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            blogToDelete = null;
            document.getElementById('deleteModal').classList.add('hidden');
        }

        async function deleteBlog() {
            if (!blogToDelete) return;

            try {
                const response = await fetch(`${API_URL}/blogs/${blogToDelete}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to delete blog post');

                hideDeleteModal();
                alert('Blog post deleted successfully');
                fetchBlogs();
            } catch (error) {
                console.error('Error deleting blog:', error);
                alert('Failed to delete blog post');
            }
        }

        function filterBlogs() {
            const authorId = document.getElementById('authorFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allBlogs;

            if (authorId) {
                filtered = filtered.filter(b => b.user_id == authorId);
            }

            if (searchTerm) {
                filtered = filtered.filter(b =>
                    b.title.toLowerCase().includes(searchTerm) ||
                    b.content.toLowerCase().includes(searchTerm)
                );
            }

            displayBlogs(filtered);
        }

        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Retry</button>
                </div>
            `;
        }

        document.getElementById('authorFilter').addEventListener('change', filterBlogs);
        document.getElementById('searchInput').addEventListener('input', filterBlogs);
        document.getElementById('deleteModalClose').addEventListener('click', hideDeleteModal);
        document.getElementById('confirmDelete').addEventListener('click', deleteBlog);

        fetchBlogs();
    </script>

    <script src="../../js/role-navigator.js"></script>
    <script src="../../js/page-protection.js"></script>
    <script src="../../js/navigation-handler.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/main.js"></script>

</body>

</html>
