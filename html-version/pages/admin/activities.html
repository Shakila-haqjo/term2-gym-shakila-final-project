<!-- pages/admin/activities.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Activities - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym - Admin</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="users.html" class="text-gray-700 hover:text-blue-600">Users</a>
                    <a href="sessions.html" class="text-gray-700 hover:text-blue-600">Sessions</a>
                    <a href="activities.html" class="text-blue-600 font-semibold">Activities</a>
                    <a href="locations.html" class="text-gray-700 hover:text-blue-600">Locations</a>
                    <a href="bookings.html" class="text-gray-700 hover:text-blue-600">Bookings</a>
                    <!-- <button data-logout class="text-red-600 hover:text-red-800">Logout</button> -->
                    <button data-logout class="text-red-600 hover:text-red-800">Logout</button>

                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Manage Activities</h2>
                <p class="text-gray-600 mt-2">Manage fitness activity types</p>
            </div>
            <button id="addActivityBtn"
                class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                + Add Activity
            </button>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading activities...</p>
        </div>

        <!-- Activities Grid -->
        <div id="activitiesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Activities will be populated here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z">
                </path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Activities Found</h3>
        </div>
    </main>

    <!-- Add/Edit Activity Modal -->
    <div id="activityModal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full">
            <div class="p-6 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 id="modalTitle" class="text-2xl font-bold text-gray-800">Add Activity</h3>
                    <button id="closeModal" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <form id="activityForm" class="p-6 space-y-6">
                <input type="hidden" id="activityId">

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Activity Name *</label>
                    <input type="text" id="name" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="e.g., Yoga, HIIT, Pilates">
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <textarea id="description" rows="4"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="Describe this activity..."></textarea>
                </div>

                <div>
                    <label for="duration" class="block text-sm font-medium text-gray-700 mb-2">Default Duration
                        (minutes)</label>
                    <input type="number" id="duration" min="15" step="15" value="60"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <div id="modalError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p id="modalErrorText"></p>
                </div>

                <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200">
                    <button type="button" id="cancelBtn"
                        class="px-6 py-3 text-gray-700 bg-gray-100 font-semibold rounded-lg hover:bg-gray-200">Cancel</button>
                    <button type="submit" id="submitBtn"
                        class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">Save
                        Activity</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Delete Activity</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to delete this activity? This action cannot be undone.
            </p>
            <div class="flex justify-end space-x-4">
                <button id="deleteModalClose"
                    class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">Cancel</button>
                <button id="confirmDelete" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete
                    Activity</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allActivities = [];
        let currentActivityId = null;
        let activityToDelete = null;

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'admin') {
            window.location.href = '../guest/login.html';
        }

        document.querySelector('[data-logout]').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        async function fetchActivities() {
            try {
                const response = await fetch(`${API_URL}/activities`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch activities');

                allActivities = await response.json();
                displayActivities();
            } catch (error) {
                console.error('Error fetching activities:', error);
                showError('Failed to load activities');
            }
        }

        function displayActivities() {
            const grid = document.getElementById('activitiesGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.classList.add('hidden');

            if (allActivities.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.classList.remove('hidden');
            grid.innerHTML = '';

            allActivities.forEach(activity => {
                const activityCard = createActivityCard(activity);
                grid.appendChild(activityCard);
            });
        }

        function createActivityCard(activity) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md hover:shadow-xl transition-shadow p-6';

            card.innerHTML = `
                <div class="mb-4">
                    <h3 class="text-xl font-bold text-gray-800 mb-2">${activity.name}</h3>
                    <p class="text-gray-600 text-sm">${activity.description || 'No description available'}</p>
                </div>

                <div class="flex items-center text-gray-500 text-sm mb-4">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span>${activity.duration_minutes || 60} minutes</span>
                </div>

                <div class="flex gap-2 pt-4 border-t border-gray-200">
                    <button onclick="editActivity(${activity.activity_id || activity.id})" class="flex-1 px-4 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">
                        Edit
                    </button>
                    <button onclick="showDeleteModal(${activity.activity_id || activity.id})" class="px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700">
                        Delete
                    </button>
                </div>
            `;

            return card;
        }

        function showCreateModal() {
            currentActivityId = null;
            document.getElementById('modalTitle').textContent = 'Add Activity';
            document.getElementById('activityForm').reset();
            document.getElementById('activityId').value = '';
            document.getElementById('submitBtn').textContent = 'Save Activity';
            document.getElementById('activityModal').classList.remove('hidden');
        }

        function editActivity(activityId) {
            currentActivityId = activityId;
            const activity = allActivities.find(a => (a.activity_id || a.id) === activityId);

            if (!activity) return;

            document.getElementById('modalTitle').textContent = 'Edit Activity';
            document.getElementById('activityId').value = activityId;
            document.getElementById('name').value = activity.name;
            document.getElementById('description').value = activity.description || '';
            document.getElementById('duration').value = activity.duration_minutes || 60;
            document.getElementById('submitBtn').textContent = 'Update Activity';
            document.getElementById('activityModal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('activityModal').classList.add('hidden');
            document.getElementById('modalError').classList.add('hidden');
        }

        document.getElementById('activityForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = currentActivityId ? 'Updating...' : 'Creating...';

            const formData = {
                name: document.getElementById('name').value.trim(),
                description: document.getElementById('description').value.trim() || null,
                duration_minutes: parseInt(document.getElementById('duration').value)
            };

            try {
                const url = currentActivityId ? `${API_URL}/activities/${currentActivityId}` : `${API_URL}/activities`;
                const method = currentActivityId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to save activity');
                }

                hideModal();
                alert(currentActivityId ? 'Activity updated successfully!' : 'Activity created successfully!');
                fetchActivities();

            } catch (error) {
                console.error('Error saving activity:', error);
                showModalError(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        function showDeleteModal(activityId) {
            activityToDelete = activityId;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            activityToDelete = null;
            document.getElementById('deleteModal').classList.add('hidden');
        }

        async function deleteActivity() {
            if (!activityToDelete) return;

            try {
                const response = await fetch(`${API_URL}/activities/${activityToDelete}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to delete activity');

                hideDeleteModal();
                alert('Activity deleted successfully');
                fetchActivities();
            } catch (error) {
                console.error('Error deleting activity:', error);
                alert('Failed to delete activity');
            }
        }

        function showModalError(message) {
            const errorDiv = document.getElementById('modalError');
            const errorText = document.getElementById('modalErrorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Retry</button>
                </div>
            `;
        }

        document.getElementById('addActivityBtn').addEventListener('click', showCreateModal);
        document.getElementById('closeModal').addEventListener('click', hideModal);
        document.getElementById('cancelBtn').addEventListener('click', hideModal);
        document.getElementById('deleteModalClose').addEventListener('click', hideDeleteModal);
        document.getElementById('confirmDelete').addEventListener('click', deleteActivity);

        fetchActivities();
    </script>
    <script src="../../js/role-navigator.js"></script>
    <script src="../../js/page-protection.js"></script>
    <script src="../../js/navigation-handler.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/main.js"></script>
    
</body>

</html>
