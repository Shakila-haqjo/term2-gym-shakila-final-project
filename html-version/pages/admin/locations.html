<!-- pages/admin/locations.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Locations - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym - Admin</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="users.html" class="text-gray-700 hover:text-blue-600">Users</a>
                    <a href="sessions.html" class="text-gray-700 hover:text-blue-600">Sessions</a>
                    <a href="activities.html" class="text-gray-700 hover:text-blue-600">Activities</a>
                    <a href="locations.html" class="text-blue-600 font-semibold">Locations</a>
                    <a href="bookings.html" class="text-gray-700 hover:text-blue-600">Bookings</a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Manage Locations</h2>
                <p class="text-gray-600 mt-2">Manage gym locations and facilities</p>
            </div>
            <button id="addLocationBtn"
                class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700 transition-colors">
                + Add Location
            </button>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading locations...</p>
        </div>

        <!-- Locations Grid -->
        <div id="locationsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Locations will be populated here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Locations Found</h3>
        </div>
    </main>

    <!-- Add/Edit Location Modal -->
    <div id="locationModal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg max-w-2xl w-full">
            <div class="p-6 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 id="modalTitle" class="text-2xl font-bold text-gray-800">Add Location</h3>
                    <button id="closeModal" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <form id="locationForm" class="p-6 space-y-6">
                <input type="hidden" id="locationId">

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Location Name *</label>
                    <input type="text" id="name" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="e.g., Main Gym, Studio A">
                </div>

                <div>
                    <label for="address" class="block text-sm font-medium text-gray-700 mb-2">Address</label>
                    <textarea id="address" rows="3"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                        placeholder="Enter location address..."></textarea>
                </div>

                <div id="modalError" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p id="modalErrorText"></p>
                </div>

                <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200">
                    <button type="button" id="cancelBtn"
                        class="px-6 py-3 text-gray-700 bg-gray-100 font-semibold rounded-lg hover:bg-gray-200">Cancel</button>
                    <button type="submit" id="submitBtn"
                        class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">Save
                        Location</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Delete Location</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to delete this location? This action cannot be undone.
            </p>
            <div class="flex justify-end space-x-4">
                <button id="deleteModalClose"
                    class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">Cancel</button>
                <button id="confirmDelete" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete
                    Location</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allLocations = [];
        let currentLocationId = null;
        let locationToDelete = null;

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'admin') {
            window.location.href = '../guest/login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        async function fetchLocations() {
            try {
                const response = await fetch(`${API_URL}/locations`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch locations');

                allLocations = await response.json();
                displayLocations();
            } catch (error) {
                console.error('Error fetching locations:', error);
                showError('Failed to load locations');
            }
        }

        function displayLocations() {
            const grid = document.getElementById('locationsGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.classList.add('hidden');

            if (allLocations.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.classList.remove('hidden');
            grid.innerHTML = '';

            allLocations.forEach(location => {
                const locationCard = createLocationCard(location);
                grid.appendChild(locationCard);
            });
        }

        function createLocationCard(location) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md hover:shadow-xl transition-shadow p-6';

            card.innerHTML = `
                <div class="mb-4">
                    <div class="flex items-center mb-3">
                        <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center mr-3">
                            <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800">${location.name}</h3>
                    </div>
                    ${location.address ? `
                        <p class="text-gray-600 text-sm">${location.address}</p>
                    ` : `
                        <p class="text-gray-400 text-sm italic">No address provided</p>
                    `}
                </div>

                <div class="flex gap-2 pt-4 border-t border-gray-200">
                    <button onclick="editLocation(${location.location_id || location.id})" class="flex-1 px-4 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">
                        Edit
                    </button>
                    <button onclick="showDeleteModal(${location.location_id || location.id})" class="px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700">
                        Delete
                    </button>
                </div>
            `;

            return card;
        }

        function showCreateModal() {
            currentLocationId = null;
            document.getElementById('modalTitle').textContent = 'Add Location';
            document.getElementById('locationForm').reset();
            document.getElementById('locationId').value = '';
            document.getElementById('submitBtn').textContent = 'Save Location';
            document.getElementById('locationModal').classList.remove('hidden');
        }

        function editLocation(locationId) {
            currentLocationId = locationId;
            const location = allLocations.find(l => (l.location_id || l.id) === locationId);

            if (!location) return;

            document.getElementById('modalTitle').textContent = 'Edit Location';
            document.getElementById('locationId').value = locationId;
            document.getElementById('name').value = location.name;
            document.getElementById('address').value = location.address || '';
            document.getElementById('submitBtn').textContent = 'Update Location';
            document.getElementById('locationModal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('locationModal').classList.add('hidden');
            document.getElementById('modalError').classList.add('hidden');
        }

        document.getElementById('locationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = currentLocationId ? 'Updating...' : 'Creating...';

            const formData = {
                name: document.getElementById('name').value.trim(),
                address: document.getElementById('address').value.trim() || null
            };

            try {
                const url = currentLocationId ? `${API_URL}/locations/${currentLocationId}` : `${API_URL}/locations`;
                const method = currentLocationId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to save location');
                }

                hideModal();
                alert(currentLocationId ? 'Location updated successfully!' : 'Location created successfully!');
                fetchLocations();

            } catch (error) {
                console.error('Error saving location:', error);
                showModalError(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        function showDeleteModal(locationId) {
            locationToDelete = locationId;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            locationToDelete = null;
            document.getElementById('deleteModal').classList.add('hidden');
        }

        async function deleteLocation() {
            if (!locationToDelete) return;

            try {
                const response = await fetch(`${API_URL}/locations/${locationToDelete}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to delete location');

                hideDeleteModal();
                alert('Location deleted successfully');
                fetchLocations();
            } catch (error) {
                console.error('Error deleting location:', error);
                alert('Failed to delete location');
            }
        }

        function showModalError(message) {
            const errorDiv = document.getElementById('modalError');
            const errorText = document.getElementById('modalErrorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }

        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Retry</button>
                </div>
            `;
        }

        document.getElementById('addLocationBtn').addEventListener('click', showCreateModal);
        document.getElementById('closeModal').addEventListener('click', hideModal);
        document.getElementById('cancelBtn').addEventListener('click', hideModal);
        document.getElementById('deleteModalClose').addEventListener('click', hideDeleteModal);
        document.getElementById('confirmDelete').addEventListener('click', deleteLocation);

        fetchLocations();
    </script>
</body>

</html>
