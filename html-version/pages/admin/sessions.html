<!-- pages/admin/sessions.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Sessions - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym - Admin</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="users.html" class="text-gray-700 hover:text-blue-600">Users</a>
                    <a href="sessions.html" class="text-blue-600 font-semibold">Sessions</a>
                    <a href="activities.html" class="text-gray-700 hover:text-blue-600">Activities</a>
                    <a href="locations.html" class="text-gray-700 hover:text-blue-600">Locations</a>
                    <a href="bookings.html" class="text-gray-700 hover:text-blue-600">Bookings</a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Manage Sessions</h2>
            <p class="text-gray-600 mt-2">View and manage all training sessions</p>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Activity</label>
                    <select id="activityFilter"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">All Activities</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Trainer</label>
                    <select id="trainerFilter"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">All Trainers</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Date</label>
                    <input type="date" id="dateFilter"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-end">
                    <button id="clearFilters"
                        class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Clear Filters
                    </button>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading sessions...</p>
        </div>

        <!-- Sessions Grid -->
        <div id="sessionsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Sessions will be populated here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Sessions Found</h3>
        </div>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Delete Session</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to delete this session? All bookings will be cancelled.
            </p>
            <div class="flex justify-end space-x-4">
                <button id="deleteModalClose"
                    class="px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">Cancel</button>
                <button id="confirmDelete" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete
                    Session</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allSessions = [];
        let activities = [];
        let trainers = [];
        let sessionToDelete = null;

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'admin') {
            window.location.href = '../guest/login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        async function fetchSessions() {
            try {
                const response = await fetch(`${API_URL}/sessions`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch sessions');

                allSessions = await response.json();
                displaySessions(allSessions);
            } catch (error) {
                console.error('Error fetching sessions:', error);
                showError('Failed to load sessions');
            }
        }

        async function fetchActivities() {
            try {
                const response = await fetch(`${API_URL}/activities`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch activities');

                activities = await response.json();
                populateActivityFilter();
            } catch (error) {
                console.error('Error fetching activities:', error);
            }
        }

        async function fetchTrainers() {
            try {
                const response = await fetch(`${API_URL}/users?role=trainer`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch trainers');

                const users = await response.json();
                trainers = users.filter(u => u.role === 'trainer');
                populateTrainerFilter();
            } catch (error) {
                console.error('Error fetching trainers:', error);
            }
        }

        function populateActivityFilter() {
            const select = document.getElementById('activityFilter');
            activities.forEach(activity => {
                const option = document.createElement('option');
                option.value = activity.id || activity.activity_id;
                option.textContent = activity.name;
                select.appendChild(option);
            });
        }

        function populateTrainerFilter() {
            const select = document.getElementById('trainerFilter');
            trainers.forEach(trainer => {
                const option = document.createElement('option');
                option.value = trainer.id || trainer.user_id;
                option.textContent = `${trainer.first_name} ${trainer.last_name}`;
                select.appendChild(option);
            });
        }

        function displaySessions(sessions) {
            const grid = document.getElementById('sessionsGrid');
            const loading = document.getElementById('loadingState');
            const empty = document.getElementById('emptyState');

            loading.classList.add('hidden');

            if (sessions.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            grid.classList.remove('hidden');
            grid.innerHTML = '';

            sessions.forEach(session => {
                const sessionCard = createSessionCard(session);
                grid.appendChild(sessionCard);
            });
        }

        function createSessionCard(session) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md hover:shadow-xl transition-shadow overflow-hidden';

            const sessionDate = new Date(session.session_date);
            const formattedDate = sessionDate.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
            const isPast = sessionDate < new Date();
            const availableSpots = session.max_participants - (session.current_participants || 0);

            card.innerHTML = `
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold text-gray-800">${session.session_name}</h3>
                        ${isPast ?
                    '<span class="px-3 py-1 bg-gray-100 text-gray-800 text-sm font-semibold rounded-full">Completed</span>' :
                    availableSpots === 0 ?
                        '<span class="px-3 py-1 bg-red-100 text-red-800 text-sm font-semibold rounded-full">Full</span>' :
                        '<span class="px-3 py-1 bg-green-100 text-green-800 text-sm font-semibold rounded-full">Active</span>'
                }
                    </div>

                    <div class="space-y-2 text-gray-600 mb-4">
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span>${session.first_name} ${session.last_name}</span>
                        </div>
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                            <span>${formattedDate}</span>
                        </div>
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            <span>${session.session_time} (${session.duration} mins)</span>
                        </div>
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                            </svg>
                            <span>${session.location_name}</span>
                        </div>
                        <div class="flex items-center">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                            </svg>
                            <span>${session.current_participants || 0}/${session.max_participants} participants</span>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-200">
                        <span class="inline-block px-3 py-1 bg-blue-100 text-blue-800 text-sm font-semibold rounded-full">
                            ${session.activity_name}
                        </span>
                    </div>

                    ${!isPast ? `
                        <button 
                            onclick="showDeleteModal(${session.session_id || session.id})"
                            class="w-full mt-4 px-6 py-3 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 transition-colors"
                        >
                            Delete Session
                        </button>
                    ` : ''}
                </div>
            `;

            return card;
        }

        function showDeleteModal(sessionId) {
            sessionToDelete = sessionId;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function hideDeleteModal() {
            sessionToDelete = null;
            document.getElementById('deleteModal').classList.add('hidden');
        }

        async function deleteSession() {
            if (!sessionToDelete) return;

            try {
                const response = await fetch(`${API_URL}/sessions/${sessionToDelete}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to delete session');

                hideDeleteModal();
                alert('Session deleted successfully');
                fetchSessions();
            } catch (error) {
                console.error('Error deleting session:', error);
                alert('Failed to delete session');
            }
        }

        function filterSessions() {
            const activityId = document.getElementById('activityFilter').value;
            const trainerId = document.getElementById('trainerFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            let filtered = allSessions;

            if (activityId) {
                filtered = filtered.filter(s => (s.activity_id) == activityId);
            }

            if (trainerId) {
                filtered = filtered.filter(s => (s.trainer_id) == trainerId);
            }

            if (dateFilter) {
                filtered = filtered.filter(s => s.session_date.startsWith(dateFilter));
            }

            displaySessions(filtered);
        }

        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Retry</button>
                </div>
            `;
        }

        document.getElementById('activityFilter').addEventListener('change', filterSessions);
        document.getElementById('trainerFilter').addEventListener('change', filterSessions);
        document.getElementById('dateFilter').addEventListener('change', filterSessions);
        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('activityFilter').value = '';
            document.getElementById('trainerFilter').value = '';
            document.getElementById('dateFilter').value = '';
            displaySessions(allSessions);
        });
        document.getElementById('deleteModalClose').addEventListener('click', hideDeleteModal);
        document.getElementById('confirmDelete').addEventListener('click', deleteSession);

        Promise.all([fetchSessions(), fetchActivities(), fetchTrainers()]);
    </script>
</body>

</html>
