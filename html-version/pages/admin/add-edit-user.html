<!-- pages/admin/add-edit-user.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add/Edit User - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym - Admin</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="users.html" class="text-blue-600 font-semibold">Users</a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-3xl">
        <div class="mb-6">
            <a href="users.html" class="inline-flex items-center text-blue-600 hover:text-blue-800 mb-4">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Users
            </a>
            <h2 class="text-3xl font-bold text-gray-800" id="pageTitle">Add User</h2>
        </div>

        <div class="bg-white rounded-lg shadow-md p-8">
            <form id="userForm" class="space-y-6">
                <input type="hidden" id="userId">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-700 mb-2">First Name *</label>
                        <input type="text" id="firstName" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-700 mb-2">Last Name *</label>
                        <input type="text" id="lastName" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
                    <input type="tel" id="phone"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label for="role" class="block text-sm font-medium text-gray-700 mb-2">Role *</label>
                    <select id="role" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">Select Role</option>
                        <option value="member">Member</option>
                        <option value="trainer">Trainer</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div id="trainerFields" class="hidden space-y-6">
                    <div>
                        <label for="specialization"
                            class="block text-sm font-medium text-gray-700 mb-2">Specialization</label>
                        <input type="text" id="specialization"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                            placeholder="e.g., Yoga, HIIT">
                    </div>
                    <div>
                        <label for="bio" class="block text-sm font-medium text-gray-700 mb-2">Bio</label>
                        <textarea id="bio" rows="3"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                </div>

                <div id="passwordField">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password *</label>
                    <input type="password" id="password"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <p class="text-sm text-gray-500 mt-1">Minimum 6 characters</p>
                </div>

                <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                    <p class="font-semibold">Error</p>
                    <p id="errorText"></p>
                </div>

                <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200">
                    <a href="users.html"
                        class="px-6 py-3 text-gray-700 bg-gray-100 font-semibold rounded-lg hover:bg-gray-200">Cancel</a>
                    <button type="submit" id="submitBtn"
                        class="px-6 py-3 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">Save
                        User</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'admin') {
            window.location.href = '../guest/login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        // Get user ID from URL if editing
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        if (userId) {
            document.getElementById('pageTitle').textContent = 'Edit User';
            document.getElementById('passwordField').classList.add('hidden');
            document.getElementById('password').required = false;
            loadUser(userId);
        }

        // Show/hide trainer fields
        document.getElementById('role').addEventListener('change', (e) => {
            const trainerFields = document.getElementById('trainerFields');
            if (e.target.value === 'trainer') {
                trainerFields.classList.remove('hidden');
            } else {
                trainerFields.classList.add('hidden');
            }
        });

        async function loadUser(id) {
            try {
                const response = await fetch(`${API_URL}/users/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load user');

                const userData = await response.json();

                document.getElementById('userId').value = id;
                document.getElementById('firstName').value = userData.first_name;
                document.getElementById('lastName').value = userData.last_name;
                document.getElementById('email').value = userData.email;
                document.getElementById('phone').value = userData.phone || '';
                document.getElementById('role').value = userData.role;

                if (userData.role === 'trainer') {
                    document.getElementById('trainerFields').classList.remove('hidden');
                    document.getElementById('specialization').value = userData.specialization || '';
                    document.getElementById('bio').value = userData.bio || '';
                }
            } catch (error) {
                console.error('Error loading user:', error);
                showError('Failed to load user data');
            }
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = userId ? 'Updating...' : 'Creating...';

            const formData = {
                first_name: document.getElementById('firstName').value.trim(),
                last_name: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim() || null,
                role: document.getElementById('role').value
            };

            if (formData.role === 'trainer') {
                formData.specialization = document.getElementById('specialization').value.trim() || null;
                formData.bio = document.getElementById('bio').value.trim() || null;
            }

            if (!userId) {
                formData.password = document.getElementById('password').value;
            }

            try {
                const url = userId ? `${API_URL}/users/${userId}` : `${API_URL}/users`;
                const method = userId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to save user');
                }

                alert(userId ? 'User updated successfully!' : 'User created successfully!');
                window.location.href = 'users.html';

            } catch (error) {
                console.error('Error saving user:', error);
                showError(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save User';
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }
    </script>
</body>

</html>
