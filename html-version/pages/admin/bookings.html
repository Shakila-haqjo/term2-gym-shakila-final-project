<!-- pages/admin/bookings.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings - High Street Gym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../css/styles.css">
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-blue-600">High Street Gym - Admin</h1>
                <div class="space-x-4">
                    <a href="dashboard.html" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="users.html" class="text-gray-700 hover:text-blue-600">Users</a>
                    <a href="sessions.html" class="text-gray-700 hover:text-blue-600">Sessions</a>
                    <a href="activities.html" class="text-gray-700 hover:text-blue-600">Activities</a>
                    <a href="locations.html" class="text-gray-700 hover:text-blue-600">Locations</a>
                    <a href="bookings.html" class="text-blue-600 font-semibold">Bookings</a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-800">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Manage Bookings</h2>
            <p class="text-gray-600 mt-2">View and manage all session bookings</p>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                    <select id="statusFilter"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        <option value="">All Status</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Search</label>
                    <input type="text" id="searchInput" placeholder="Search by user or session..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-end">
                    <button id="clearFilters"
                        class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        Clear Filters
                    </button>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-gray-600">Loading bookings...</p>
        </div>

        <!-- Bookings Table -->
        <div id="bookingsContainer" class="bg-white rounded-lg shadow-md overflow-hidden hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Booking ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Member</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Session</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Date & Time</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Booked On</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Bookings will be populated here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <svg class="mx-auto h-24 w-24 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2">
                </path>
            </svg>
            <h3 class="mt-4 text-xl font-semibold text-gray-700">No Bookings Found</h3>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let allBookings = [];

        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        if (!token || user.role !== 'admin') {
            window.location.href = '../guest/login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '../guest/login.html';
        });

        async function fetchBookings() {
            try {
                const response = await fetch(`${API_URL}/bookings`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to fetch bookings');

                allBookings = await response.json();
                displayBookings(allBookings);
            } catch (error) {
                console.error('Error fetching bookings:', error);
                showError('Failed to load bookings');
            }
        }

        function displayBookings(bookings) {
            const loading = document.getElementById('loadingState');
            const container = document.getElementById('bookingsContainer');
            const empty = document.getElementById('emptyState');
            const tableBody = document.getElementById('bookingsTableBody');

            loading.classList.add('hidden');

            if (bookings.length === 0) {
                container.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            container.classList.remove('hidden');
            tableBody.innerHTML = '';

            bookings.forEach(booking => {
                const row = createBookingRow(booking);
                tableBody.appendChild(row);
            });
        }

        function createBookingRow(booking) {
            const tr = document.createElement('tr');
            tr.className = 'hover:bg-gray-50';

            const sessionDate = new Date(booking.session_date);
            const formattedSessionDate = sessionDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            const bookingDate = new Date(booking.booking_date);
            const formattedBookingDate = bookingDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            const statusColors = {
                confirmed: 'bg-green-100 text-green-800',
                cancelled: 'bg-red-100 text-red-800',
                completed: 'bg-blue-100 text-blue-800'
            };

            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-medium text-gray-900">#${booking.booking_id || booking.id}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm font-medium text-gray-900">${booking.user_name}</div>
                    <div class="text-sm text-gray-500">${booking.user_email}</div>
                </td>
                <td class="px-6 py-4">
                    <div class="text-sm font-medium text-gray-900">${booking.session_name}</div>
                    <div class="text-sm text-gray-500">${booking.activity_name}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <div class="text-sm text-gray-900">${formattedSessionDate}</div>
                    <div class="text-sm text-gray-500">${booking.session_time}</div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColors[booking.status]}">
                        ${booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    ${formattedBookingDate}
                </td>
            `;

            return tr;
        }

        function filterBookings() {
            const statusFilter = document.getElementById('statusFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allBookings;

            if (statusFilter) {
                filtered = filtered.filter(b => b.status === statusFilter);
            }

            if (searchTerm) {
                filtered = filtered.filter(b =>
                    b.user_name.toLowerCase().includes(searchTerm) ||
                    b.session_name.toLowerCase().includes(searchTerm) ||
                    b.user_email.toLowerCase().includes(searchTerm)
                );
            }

            displayBookings(filtered);
        }

        function showError(message) {
            const loading = document.getElementById('loadingState');
            loading.innerHTML = `
                <div class="text-center py-12">
                    <svg class="mx-auto h-24 w-24 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <h3 class="mt-4 text-xl font-semibold text-gray-700">${message}</h3>
                    <button onclick="location.reload()" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Retry</button>
                </div>
            `;
        }

        document.getElementById('statusFilter').addEventListener('change', filterBookings);
        document.getElementById('searchInput').addEventListener('input', filterBookings);
        document.getElementById('clearFilters').addEventListener('click', () => {
            document.getElementById('statusFilter').value = '';
            document.getElementById('searchInput').value = '';
            displayBookings(allBookings);
        });

        fetchBookings();
    </script>
</body>

</html>
