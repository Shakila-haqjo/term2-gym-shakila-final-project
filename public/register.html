<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card" style="max-width: 500px;">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
      <h1>Create Account</h1>
      <p>Join FitGym and start your fitness journey</p>
    </div>

    <div id="alertBox"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div style="position:relative;">
          <i class="fas fa-user" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#9ca3af;"></i>
          <input type="text" id="name" class="form-control" style="padding-left: 38px;" placeholder="John Doe" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div style="position:relative;">
          <i class="fas fa-envelope" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#9ca3af;"></i>
          <input type="email" id="email" class="form-control" style="padding-left: 38px;" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min. 6 characters" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">I want to join as</label>
        <div style="display: flex; gap: 12px;">
          <label style="flex:1; cursor:pointer;">
            <input type="radio" name="role" value="member" checked style="margin-right: 6px;">
            <span class="badge badge-info" style="cursor:pointer; padding: 8px 14px;"><i class="fas fa-user"></i> Member</span>
          </label>
          <label style="flex:1; cursor:pointer;">
            <input type="radio" name="role" value="trainer" style="margin-right: 6px;">
            <span class="badge badge-purple" style="cursor:pointer; padding: 8px 14px;"><i class="fas fa-user-tie"></i> Trainer</span>
          </label>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Phone (optional)</label>
          <input type="tel" id="phone" class="form-control" placeholder="555-0100">
        </div>
        <div class="form-group">
          <label class="form-label">Address (optional)</label>
          <input type="text" id="address" class="form-control" placeholder="123 Main St">
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="submitBtn">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div style="text-align:center; margin-top: 20px; font-size: 0.875rem; color: var(--text-secondary);">
      Already have an account? <a href="/login.html" style="color: var(--accent-gold); font-weight: 600; text-decoration: none;">Sign in</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
