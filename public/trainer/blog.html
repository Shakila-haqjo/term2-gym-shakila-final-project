<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Management - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Blog Management</span>
        </div>
        <div class="header-right">
          <button class="btn btn-sm btn-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> New Post</button>
        </div>
      </header>
      <div class="page-content">
        <div class="card">
          <div class="card-body" style="padding:0;">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Views</th>
                    <th>Date</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="blogsTable">
                  <tr><td colspan="6"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div class="modal-overlay" id="blogModal">
    <div class="modal" style="max-width: 680px;">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">New Blog Post</span>
        <button class="modal-close" onclick="closeModal('blogModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input type="text" id="blogTitle" class="form-control" placeholder="Enter title...">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="blogCategory" class="form-control">
              <option value="">Select...</option>
              <option value="Fitness Tips">Fitness Tips</option>
              <option value="Nutrition">Nutrition</option>
              <option value="Wellness">Wellness</option>
              <option value="Science">Science</option>
              <option value="Motivation">Motivation</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="blogStatus" class="form-control">
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Content</label>
          <textarea id="blogContent" class="form-control" style="min-height: 220px;" placeholder="Write your content here (HTML supported)..."></textarea>
        </div>
        <input type="hidden" id="editBlogId">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('blogModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveBlog()"><i class="fas fa-save"></i> Save Post</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/trainer-blog.js"></script>
</body>
</html>
