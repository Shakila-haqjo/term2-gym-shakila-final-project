<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Bookings - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Session Bookings</span>
        </div>
        <div class="header-right">
          <a href="/trainer/sessions.html" class="btn btn-sm btn-secondary"><i class="fas fa-arrow-left"></i> Back to Sessions</a>
        </div>
      </header>
      <div class="page-content">
        <!-- Session Info -->
        <div id="sessionInfo" class="card" style="margin-bottom:20px;">
          <div class="loading-spinner"><div class="spinner"></div></div>
        </div>

        <!-- Bookings Table -->
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-users" style="color:var(--accent-gold)"></i> Enrolled Members</span>
            <span id="bookingCount" class="badge badge-info">-</span>
          </div>
          <div class="card-body" style="padding:0;">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Member</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Booked On</th>
                  </tr>
                </thead>
                <tbody id="bookingsTable">
                  <tr><td colspan="6"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/trainer-session-bookings.js"></script>
</body>
</html>
