<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-key"></i></div>
      <h1>Reset Password</h1>
      <p>Enter your email to receive reset instructions</p>
    </div>

    <div id="alertBox"></div>
    <div id="successBox" class="hidden">
      <div class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        <div>
          <strong>Email sent!</strong><br>
          <small>If an account exists with that email, you'll receive reset instructions shortly.</small>
        </div>
      </div>
      <a href="/login.html" class="btn btn-primary w-100"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>

    <form id="resetForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div style="position:relative;">
          <i class="fas fa-envelope" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#9ca3af;"></i>
          <input type="email" id="email" class="form-control" style="padding-left: 38px;" placeholder="your@email.com" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100" id="submitBtn">
        <i class="fas fa-paper-plane"></i> Send Reset Link
      </button>
    </form>

    <div style="text-align:center; margin-top: 20px; font-size: 0.875rem; color: var(--text-secondary);">
      <a href="/login.html" style="color: var(--accent-gold); text-decoration: none;"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alertBox = document.getElementById('alertBox');
      alertBox.innerHTML = '';
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

      try {
        await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        });
        document.getElementById('resetForm').classList.add('hidden');
        document.getElementById('successBox').classList.remove('hidden');
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Something went wrong. Please try again.</div>`;
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
      }
    });
  </script>
</body>
</html>
