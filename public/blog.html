<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- Top nav for non-authenticated users -->
  <nav class="landing-nav" id="publicNav">
    <a href="/" class="logo"><i class="fas fa-dumbbell"></i> FitGym</a>
    <div class="landing-nav-links">
      <a href="/blog.html" style="color: var(--accent-gold);">Blog</a>
      <a href="/login.html" class="btn" style="border: 1.5px solid var(--accent-gold); color: var(--accent-gold); padding: 7px 16px; border-radius: 7px;">Login</a>
      <a href="/register.html" class="btn btn-primary" style="padding: 7px 16px;">Join Now</a>
    </div>
  </nav>

  <div style="max-width: 1100px; margin: 0 auto; padding: 40px 24px;">
    <div style="margin-bottom: 32px;">
      <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 8px;">Fitness Blog</h1>
      <p style="color: var(--text-secondary);">Expert tips, guides, and inspiration from our trainers</p>
    </div>

    <!-- Search & Filter -->
    <div class="search-bar" style="margin-bottom: 32px;">
      <div class="search-input-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" class="form-control" placeholder="Search articles...">
      </div>
      <select id="categoryFilter" class="form-control" style="max-width: 200px;">
        <option value="">All Categories</option>
        <option value="Fitness Tips">Fitness Tips</option>
        <option value="Nutrition">Nutrition</option>
        <option value="Wellness">Wellness</option>
        <option value="Science">Science</option>
        <option value="Motivation">Motivation</option>
      </select>
    </div>

    <!-- Blog Grid -->
    <div id="blogGrid" class="blog-grid">
      <div class="loading-spinner"><div class="spinner"></div></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/blog.js"></script>
</body>
</html>
