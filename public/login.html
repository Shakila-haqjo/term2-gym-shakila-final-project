<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="auth-page">
  <div class="auth-card shadow-2xl">
    <div class="auth-logo">
      <div class="logo-icon"><i class="fas fa-dumbbell"></i></div>
      <h1>Welcome Back</h1>
      <p>Sign in to your FitGym account</p>
    </div>

    <div id="alertBox"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div style="position:relative;">
          <i class="fas fa-envelope" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#9ca3af;"></i>
          <input type="email" id="email" class="form-control" style="padding-left: 38px;" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">
          Password
          <!-- <a href="/reset-password.html" style="float:right; font-size:0.8rem; color: var(--accent-gold); text-decoration:none;">Forgot password?</a> -->
        </label>
        <div style="position:relative;">
          <i class="fas fa-lock" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#9ca3af;"></i>
          <input type="password" id="password" class="form-control" style="padding-left: 38px;" placeholder="••••••••" required>
          <button type="button" onclick="togglePass()" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#9ca3af;">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 transition-all duration-200 hover:scale-[1.02] hover:shadow-lg" style="margin-top: 8px;" id="submitBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div style="text-align:center; margin-top: 20px; font-size: 0.875rem; color: var(--text-secondary);">
      Don't have an account? <a href="/register.html" style="color: var(--accent-gold); font-weight: 600; text-decoration: none;">Create one</a>
    </div>

    <div style="margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-color);">
      <p style="font-size: 0.78rem; color: var(--text-secondary); text-align: center; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em;">Demo Credentials</p>
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <button class="btn btn-secondary btn-sm transition-all duration-150 hover:scale-[1.01]" onclick="fillCreds('admin@gym.com','admin123')">
          <i class="fas fa-shield-alt" style="color: var(--warning)"></i> Admin: admin@gym.com / admin123
        </button>
        <button class="btn btn-secondary btn-sm transition-all duration-150 hover:scale-[1.01]" onclick="fillCreds('sarah@gym.com','trainer123')">
          <i class="fas fa-user-tie" style="color: var(--info)"></i> Trainer: sarah@gym.com / trainer123
        </button>
        <button class="btn btn-secondary btn-sm transition-all duration-150 hover:scale-[1.01]" onclick="fillCreds('alice@gym.com','member123')">
          <i class="fas fa-user" style="color: var(--success)"></i> Member: alice@gym.com / member123
        </button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
