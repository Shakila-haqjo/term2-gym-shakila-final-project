<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Posts - Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Blog Posts</span>
        </div>
      </header>
      <div class="page-content">
        <div id="alertBox"></div>

        <!-- Filters -->
        <div class="card" style="margin-bottom: 20px;">
          <div class="card-body" style="padding: 16px 20px;">
            <div class="search-bar" style="margin-bottom: 0;">
              <div class="search-input-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="form-control" placeholder="Search posts...">
              </div>
              <select id="statusFilter" class="form-control" style="max-width: 160px;">
                <option value="">All Status</option>
                <option value="published">Published</option>
                <option value="draft">Draft</option>
              </select>
              <button class="btn btn-secondary btn-sm" onclick="loadBlogs()"><i class="fas fa-filter"></i> Filter</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding: 0;">
            <table class="table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Author</th>
                  <th>Category</th>
                  <th>Status</th>
                  <th>Views</th>
                  <th>Date</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="blogsTable">
                <tr><td colspan="7"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/admin-blogs.js"></script>
</body>
</html>
