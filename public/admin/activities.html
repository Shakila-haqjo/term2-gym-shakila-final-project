<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activities - FitGym Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Activities Management</span>
        </div>
        <div class="header-right">
          <button class="btn btn-sm btn-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> Add Activity</button>
        </div>
      </header>
      <div class="page-content">
        <div class="card">
          <div class="card-body" style="padding:0;">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Activity Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="activitiesTable">
                  <tr><td colspan="5"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="activityModal">
    <div class="modal" style="max-width: 480px;">
      <div class="modal-header">
        <span class="modal-title" id="actModalTitle">Add Activity</span>
        <button class="modal-close" onclick="closeModal('activityModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Activity Name *</label>
          <input type="text" id="actName" class="form-control" placeholder="e.g., Yoga, CrossFit...">
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="actDescription" class="form-control" placeholder="Brief description..."></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="actStatus" class="form-control">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <input type="hidden" id="editActId">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('activityModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveActivity()"><i class="fas fa-save"></i> Save</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/admin-activities.js"></script>
</body>
</html>
