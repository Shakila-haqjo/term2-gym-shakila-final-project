<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sessions - FitGym Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Sessions Management</span>
        </div>
        <div class="header-right">
          <button class="btn btn-sm btn-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> Add Session</button>
        </div>
      </header>
      <div class="page-content">
        <div class="card" style="margin-bottom:20px;">
          <div class="card-body" style="padding:16px 20px;">
            <div class="search-bar" style="margin-bottom:0;">
              <div class="search-input-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="form-control" placeholder="Search sessions...">
              </div>
              <select id="activityFilter" class="form-control" style="max-width:180px;">
                <option value="">All Activities</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="loadSessions()"><i class="fas fa-filter"></i> Filter</button>
              <button class="btn btn-secondary btn-sm" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding:0;">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>Session</th>
                    <th>Activity</th>
                    <th>Trainer</th>
                    <th>Date & Time</th>
                    <th>Location</th>
                    <th>Spots</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="sessionsTable">
                  <tr><td colspan="7"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div class="modal-overlay" id="sessionModal">
    <div class="modal" style="max-width:640px;">
      <div class="modal-header">
        <span class="modal-title" id="sessionModalTitle">Add Session</span>
        <button class="modal-close" onclick="closeModal('sessionModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Session Name *</label>
          <input type="text" id="sName" class="form-control" placeholder="e.g., Morning Yoga Flow">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Activity</label>
            <select id="sActivity" class="form-control"><option value="">Select...</option></select>
          </div>
          <div class="form-group">
            <label class="form-label">Location</label>
            <select id="sLocation" class="form-control"><option value="">Select...</option></select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Trainer</label>
          <select id="sTrainer" class="form-control"><option value="">Select trainer...</option></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date *</label>
            <input type="date" id="sDate" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Time *</label>
            <input type="time" id="sTime" class="form-control">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Duration (min)</label>
            <input type="number" id="sDuration" class="form-control" value="60" min="15">
          </div>
          <div class="form-group">
            <label class="form-label">Max Participants</label>
            <input type="number" id="sMaxP" class="form-control" value="20" min="1">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="sDescription" class="form-control" placeholder="Session description..."></textarea>
        </div>
        <input type="hidden" id="editSessionId">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('sessionModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveSession()"><i class="fas fa-save"></i> Save</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/admin-sessions.js"></script>
</body>
</html>
