<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Admin Dashboard</span>
        </div>
        <div class="header-right">
          <span id="headerDate" style="font-size:0.85rem; color:var(--text-secondary);"></span>
        </div>
      </header>
      <div class="page-content">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-users"></i></div><div class="stat-info"><div class="stat-value" id="statUsers">-</div><div class="stat-label">Total Users</div></div></div>
          <div class="stat-card"><div class="stat-icon gold"><i class="fas fa-calendar-alt"></i></div><div class="stat-info"><div class="stat-value" id="statSessions">-</div><div class="stat-label">Total Sessions</div></div></div>
          <div class="stat-card"><div class="stat-icon green"><i class="fas fa-ticket-alt"></i></div><div class="stat-info"><div class="stat-value" id="statBookings">-</div><div class="stat-label">Total Bookings</div></div></div>
          <div class="stat-card"><div class="stat-icon purple"><i class="fas fa-blog"></i></div><div class="stat-info"><div class="stat-value" id="statBlogs">-</div><div class="stat-label">Blog Posts</div></div></div>
        </div>

        <!-- Secondary Stats -->
        <div class="stats-grid" style="margin-bottom:24px;">
          <div class="stat-card"><div class="stat-icon green"><i class="fas fa-user-check"></i></div><div class="stat-info"><div class="stat-value" id="statMembers">-</div><div class="stat-label">Members</div></div></div>
          <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-user-tie"></i></div><div class="stat-info"><div class="stat-value" id="statTrainers">-</div><div class="stat-label">Trainers</div></div></div>
          <div class="stat-card"><div class="stat-icon gold"><i class="fas fa-check-circle"></i></div><div class="stat-info"><div class="stat-value" id="statConfirmed">-</div><div class="stat-label">Confirmed Bookings</div></div></div>
          <div class="stat-card"><div class="stat-icon red"><i class="fas fa-times-circle"></i></div><div class="stat-info"><div class="stat-value" id="statCancelled">-</div><div class="stat-label">Cancelled</div></div></div>
        </div>

        <div style="display:grid; grid-template-columns:2fr 1fr; gap:20px; align-items:start;">
          <!-- Bookings Chart -->
          <div class="card">
            <div class="card-header">
              <span class="card-title"><i class="fas fa-chart-bar" style="color:var(--accent-gold)"></i> Bookings (Last 7 Days)</span>
            </div>
            <div class="card-body">
              <canvas id="bookingsChart" height="120"></canvas>
            </div>
          </div>

          <!-- Quick Actions -->
          <div class="card">
            <div class="card-header"><span class="card-title"><i class="fas fa-bolt" style="color:var(--accent-gold)"></i> Quick Actions</span></div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:10px;">
              <a href="/admin/users.html" class="btn btn-secondary"><i class="fas fa-user-plus"></i> Manage Users</a>
              <a href="/admin/sessions.html" class="btn btn-secondary"><i class="fas fa-calendar-plus"></i> Manage Sessions</a>
              <a href="/admin/bookings.html" class="btn btn-secondary"><i class="fas fa-ticket-alt"></i> View Bookings</a>
              <a href="/admin/activities.html" class="btn btn-secondary"><i class="fas fa-running"></i> Activities</a>
              <a href="/admin/locations.html" class="btn btn-secondary"><i class="fas fa-map-marker-alt"></i> Locations</a>
            </div>
          </div>
        </div>

        <!-- Recent Activity -->
        <div class="card" style="margin-top:20px;">
          <div class="card-header">
            <span class="card-title"><i class="fas fa-history" style="color:var(--accent-gold)"></i> Recent Bookings</span>
            <a href="/admin/bookings.html" class="btn btn-sm btn-secondary">View All</a>
          </div>
          <div class="card-body" style="padding:0;">
            <div class="table-container">
              <table>
                <thead>
                  <tr><th>Member</th><th>Session</th><th>Date</th><th>Status</th><th>Booked</th></tr>
                </thead>
                <tbody id="recentBookings">
                  <tr><td colspan="5"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/admin-dashboard.js"></script>
</body>
</html>
