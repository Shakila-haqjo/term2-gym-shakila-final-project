<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - FitGym Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">User Management</span>
        </div>
        <div class="header-right">
          <button class="btn btn-sm btn-primary" onclick="openCreateModal()"><i class="fas fa-user-plus"></i> Add User</button>
        </div>
      </header>
      <div class="page-content">
        <div class="card" style="margin-bottom:20px;">
          <div class="card-body" style="padding:16px 20px;">
            <div class="search-bar" style="margin-bottom:0;">
              <div class="search-input-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="form-control" placeholder="Search by name or email...">
              </div>
              <select id="roleFilter" class="form-control" style="max-width:160px;">
                <option value="">All Roles</option>
                <option value="member">Member</option>
                <option value="trainer">Trainer</option>
                <option value="admin">Admin</option>
              </select>
              <select id="statusFilter" class="form-control" style="max-width:160px;">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="loadUsers()"><i class="fas fa-filter"></i> Filter</button>
              <button class="btn btn-secondary btn-sm" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding:0;">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>User</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Joined</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="usersTable">
                  <tr><td colspan="7"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Create/Edit Modal -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="userModalTitle">Add User</span>
        <button class="modal-close" onclick="closeModal('userModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input type="text" id="uName" class="form-control" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input type="email" id="uEmail" class="form-control" placeholder="email@example.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password <span id="passHint" style="font-size:0.78rem;color:var(--text-secondary);">(required for new)</span></label>
            <input type="password" id="uPassword" class="form-control" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" id="uPhone" class="form-control" placeholder="555-0100">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Role</label>
            <select id="uRole" class="form-control">
              <option value="member">Member</option>
              <option value="trainer">Trainer</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="uStatus" class="form-control">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" id="uAddress" class="form-control" placeholder="123 Main St">
        </div>
        <input type="hidden" id="editUserId">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('userModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveUser()"><i class="fas fa-save"></i> Save</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/admin-users.js"></script>
</body>
</html>
