<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locations - FitGym Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Locations Management</span>
        </div>
        <div class="header-right">
          <button class="btn btn-sm btn-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> Add Location</button>
        </div>
      </header>
      <div class="page-content">
        <div class="card">
          <div class="card-body" style="padding:0;">
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Location Name</th>
                    <th>Address</th>
                    <th>Capacity</th>
                    <th>Status</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="locationsTable">
                  <tr><td colspan="6"><div class="loading-spinner"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="locationModal">
    <div class="modal" style="max-width: 480px;">
      <div class="modal-header">
        <span class="modal-title" id="locModalTitle">Add Location</span>
        <button class="modal-close" onclick="closeModal('locationModal')">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Location Name *</label>
          <input type="text" id="locName" class="form-control" placeholder="e.g., Main Studio">
        </div>
        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" id="locAddress" class="form-control" placeholder="1 Gym Plaza, Room A">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Capacity</label>
            <input type="number" id="locCapacity" class="form-control" value="20" min="1">
          </div>
          <div class="form-group">
            <label class="form-label">Status</label>
            <select id="locStatus" class="form-control">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </div>
        <input type="hidden" id="editLocId">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('locationModal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveLocation()"><i class="fas fa-save"></i> Save</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/admin-locations.js"></script>
</body>
</html>
