<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Member Dashboard - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <script>tailwind.config = { corePlugins: { preflight: false } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Member Dashboard</span>
        </div>
        <div class="header-right">
          <span class="header-user"><i class="fas fa-calendar-alt" style="color:var(--accent-gold)"></i> <span id="headerDate"></span></span>
        </div>
      </header>
      <div class="page-content">
        <div id="welcomeBanner" style="background: linear-gradient(135deg,#1e2537,#2d3748); border-radius:12px; padding:24px 28px; color:white; margin-bottom:24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;">
          <div>
            <h2 style="font-size:1.4rem; font-weight:700; margin-bottom:4px;">Welcome back, <span id="welcomeName" style="color:var(--accent-gold)"></span>!</h2>
            <p style="color:#94a3b8; font-size:0.9rem;">Ready for your next workout? Check out available sessions below.</p>
          </div>
          <a href="/member/sessions.html" class="btn btn-primary"><i class="fas fa-search"></i> Browse Sessions</a>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="stat-icon blue"><i class="fas fa-ticket-alt"></i></div><div class="stat-info"><div class="stat-value" id="statTotal">-</div><div class="stat-label">Total Bookings</div></div></div>
          <div class="stat-card"><div class="stat-icon green"><i class="fas fa-calendar-check"></i></div><div class="stat-info"><div class="stat-value" id="statUpcoming">-</div><div class="stat-label">Upcoming Sessions</div></div></div>
          <div class="stat-card"><div class="stat-icon gold"><i class="fas fa-check-circle"></i></div><div class="stat-info"><div class="stat-value" id="statConfirmed">-</div><div class="stat-label">Confirmed</div></div></div>
          <div class="stat-card"><div class="stat-icon red"><i class="fas fa-times-circle"></i></div><div class="stat-info"><div class="stat-value" id="statCancelled">-</div><div class="stat-label">Cancelled</div></div></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
          <!-- Upcoming Bookings -->
          <div class="card">
            <div class="card-header">
              <span class="card-title"><i class="fas fa-calendar-alt" style="color:var(--accent-gold)"></i> Upcoming Sessions</span>
              <a href="/member/bookings.html" class="btn btn-sm btn-secondary">View All</a>
            </div>
            <div id="upcomingBookings" style="padding: 8px 0;">
              <div class="loading-spinner"><div class="spinner"></div></div>
            </div>
          </div>

          <!-- Quick Actions -->
          <div>
            <div class="card" style="margin-bottom:20px;">
              <div class="card-header"><span class="card-title"><i class="fas fa-bolt" style="color:var(--accent-gold)"></i> Quick Actions</span></div>
              <div class="card-body" style="display:flex; flex-direction:column; gap:10px;">
                <a href="/member/sessions.html" class="btn btn-primary"><i class="fas fa-search"></i> Find a Session</a>
                <a href="/member/bookings.html" class="btn btn-secondary"><i class="fas fa-ticket-alt"></i> My Bookings</a>
                <a href="/member/create-blog.html" class="btn btn-secondary"><i class="fas fa-pen"></i> Write Blog Post</a>
                <a href="/member/profile.html" class="btn btn-secondary"><i class="fas fa-user"></i> Edit Profile</a>
              </div>
            </div>

            <div class="card">
              <div class="card-header"><span class="card-title"><i class="fas fa-newspaper" style="color:var(--accent-gold)"></i> Latest Blog Posts</span></div>
              <div id="latestBlogs" style="padding: 8px 0;">
                <div class="loading-spinner"><div class="spinner"></div></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/member-dashboard.js"></script>
</body>
</html>
