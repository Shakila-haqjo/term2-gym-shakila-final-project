<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write Blog - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Write Blog Post</span>
        </div>
        <div class="header-right">
          <a href="/blog.html" class="btn btn-sm btn-secondary"><i class="fas fa-eye"></i> View Blog</a>
        </div>
      </header>
      <div class="page-content">
        <div id="alertBox"></div>
        <div style="display:grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start;">
          <div class="card">
            <div class="card-header"><span class="card-title">Post Content</span></div>
            <div class="card-body">
              <div class="form-group">
                <label class="form-label">Title *</label>
                <input type="text" id="title" class="form-control" placeholder="Enter a compelling title...">
              </div>
              <div class="form-group">
                <label class="form-label">Content *</label>
                <textarea id="content" class="form-control" style="min-height: 320px;" placeholder="Write your blog post content here. You can use HTML tags for formatting (e.g., &lt;h2&gt;, &lt;p&gt;, &lt;strong&gt;, etc.)..."></textarea>
              </div>
            </div>
          </div>
          <div>
            <div class="card" style="margin-bottom: 16px;">
              <div class="card-header"><span class="card-title">Post Settings</span></div>
              <div class="card-body">
                <div class="form-group">
                  <label class="form-label">Category</label>
                  <select id="category" class="form-control">
                    <option value="">Select category...</option>
                    <option value="Fitness Tips">Fitness Tips</option>
                    <option value="Nutrition">Nutrition</option>
                    <option value="Wellness">Wellness</option>
                    <option value="Science">Science</option>
                    <option value="Motivation">Motivation</option>
                    <option value="News">News</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label">Featured Image URL (optional)</label>
                  <input type="url" id="featuredImage" class="form-control" placeholder="https://...">
                </div>
                <div class="form-group">
                  <label class="form-label">Status</label>
                  <select id="status" class="form-control">
                    <option value="draft">Save as Draft</option>
                    <option value="published">Publish Now</option>
                  </select>
                </div>
              </div>
            </div>
            <div style="display:flex; flex-direction:column; gap:10px;">
              <button class="btn btn-primary" onclick="submitBlog('published')"><i class="fas fa-paper-plane"></i> Publish Post</button>
              <button class="btn btn-secondary" onclick="submitBlog('draft')"><i class="fas fa-save"></i> Save as Draft</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/member-create-blog.js"></script>
</body>
</html>
