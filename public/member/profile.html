<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">My Profile</span>
        </div>
      </header>
      <div class="page-content">
        <div id="alertBox"></div>
        <div style="display:grid; grid-template-columns: 280px 1fr; gap: 20px; align-items: start;">
          <!-- Profile Card -->
          <div class="card">
            <div class="card-body" style="text-align:center;">
              <div style="width:80px; height:80px; border-radius:50%; background:var(--accent-gold); display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:1.8rem; color:white; font-weight:700;" id="avatarCircle"></div>
              <h3 id="profileName" style="font-size:1.1rem; font-weight:600;"></h3>
              <div id="profileRole" style="margin:4px 0 12px;"></div>
              <div style="font-size:0.85rem; color:var(--text-secondary);" id="profileEmail"></div>
              <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:4px;" id="profilePhone"></div>
              <div style="font-size:0.85rem; color:var(--text-secondary); margin-top:4px;" id="profileAddress"></div>
              <div style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border-color); font-size:0.8rem; color:var(--text-secondary);">
                Member since <span id="profileJoined"></span>
              </div>
            </div>
          </div>

          <!-- Edit Forms -->
          <div>
            <div class="card" style="margin-bottom: 20px;">
              <div class="card-header"><span class="card-title"><i class="fas fa-user-edit" style="color:var(--accent-gold)"></i> Edit Profile</span></div>
              <div class="card-body">
                <form id="profileForm">
                  <div class="form-row">
                    <div class="form-group">
                      <label class="form-label">Full Name</label>
                      <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                      <label class="form-label">Email</label>
                      <input type="email" id="email" class="form-control" disabled style="background:#f9fafb;">
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="form-group">
                      <label class="form-label">Phone</label>
                      <input type="tel" id="phone" class="form-control">
                    </div>
                    <div class="form-group">
                      <label class="form-label">Address</label>
                      <input type="text" id="address" class="form-control">
                    </div>
                  </div>
                  <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                </form>
              </div>
            </div>

            <div class="card">
              <div class="card-header"><span class="card-title"><i class="fas fa-lock" style="color:var(--accent-gold)"></i> Change Password</span></div>
              <div class="card-body">
                <form id="passwordForm">
                  <div class="form-row">
                    <div class="form-group">
                      <label class="form-label">New Password</label>
                      <input type="password" id="newPassword" class="form-control" placeholder="Min. 6 characters">
                    </div>
                    <div class="form-group">
                      <label class="form-label">Confirm New Password</label>
                      <input type="password" id="confirmPassword" class="form-control" placeholder="Repeat new password">
                    </div>
                  </div>
                  <button type="submit" class="btn btn-secondary"><i class="fas fa-key"></i> Update Password</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/member-profile.js"></script>
</body>
</html>
