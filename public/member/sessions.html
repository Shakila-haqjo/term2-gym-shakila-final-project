<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Sessions - FitGym</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <div id="nav-placeholder"></div>
    <div class="main-content">
      <header class="top-header">
        <div class="header-left">
          <button class="hamburger" id="hamburgerBtn"><span></span><span></span><span></span></button>
          <span class="page-title">Browse Sessions</span>
        </div>
        <div class="header-right">
          <a href="/member/bookings.html" class="btn btn-sm btn-secondary"><i class="fas fa-ticket-alt"></i> My Bookings</a>
        </div>
      </header>
      <div class="page-content">
        <!-- Filters -->
        <div class="card" style="margin-bottom: 20px;">
          <div class="card-body" style="padding: 16px 20px;">
            <div class="search-bar" style="margin-bottom: 0;">
              <div class="search-input-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" class="form-control" placeholder="Search sessions...">
              </div>
              <select id="activityFilter" class="form-control" style="max-width: 200px;">
                <option value="">All Activities</option>
              </select>
              <select id="upcomingFilter" class="form-control" style="max-width: 180px;">
                <option value="true">Upcoming Only</option>
                <option value="">All Sessions</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="loadSessions()"><i class="fas fa-filter"></i> Filter</button>
              <button class="btn btn-secondary btn-sm" onclick="clearFilters()"><i class="fas fa-times"></i> Clear</button>
            </div>
          </div>
        </div>

        <div id="sessionGrid" class="session-grid">
          <div class="loading-spinner" style="grid-column: 1/-1;"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Booking Confirm Modal -->
  <div class="modal-overlay" id="bookModal">
    <div class="modal" style="max-width: 460px;">
      <div class="modal-header">
        <span class="modal-title"><i class="fas fa-ticket-alt"></i> Confirm Booking</span>
        <button class="modal-close" onclick="closeBookModal()">&times;</button>
      </div>
      <div class="modal-body" id="bookModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeBookModal()">Cancel</button>
        <button class="btn btn-primary" id="confirmBookBtn"><i class="fas fa-check"></i> Book Now</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/member-sessions.js"></script>
</body>
</html>
